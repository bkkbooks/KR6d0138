body:
  text: 丹丘沙門有嚴注止觀輔行傳弘決卷第八有界內真或理性二乘真或有真種子亦通亦別搜要云陰唯是別將別對通故復名通餘九各皆有互通及以相異只是一法得名不同故名二是不得名陰因別陰等也今觀陰果若陰因者乃煩惱境耳別陰通諸境論無我界別搜要云不同陰入況復九耶煩惱果陰等豈同逆病搜要云業病也今以怖為病不同業境禪定等餘境如不淨觀治愛魔五處如理涅槃疏云五屍表五不淨觀治愛魔五繫表五門觀伏見魔今云如理恐是五門禪如其理而治見也搜要云五繫魔別者首楞嚴制非陰煩惱等豈同心數及上定等搜要云非心所定等上定者觀心性等及別見地住已上別見非小乘道品所治因觀無常謂為極果搜要云小乘未極挫為上慢豈同下八分三科異論初陰入界三初以四念治陰餘九能治準此可知停心治五障約諸品進下品惑進入中品中品進入上品名進分於下品不進名住等論未得記菩薩輕得記者記引經云我證阿䟦致餘人永無若詳此文義似得記者輕未得記者也又記引大品觀空不證品甞撿經乃是夢中不證品耳經云魔來語無方便菩薩言汝當來世得菩提佛言阿跋致行類相貌是人永無因以名字輕弄餘人云云學者詳之從事理說搜要云從事雖隔理具十乘彼彼三千互徧亦爾搜要云心佛眾生三諦理徧一生一切生一生一切佛一佛一切佛一佛一切生理三若互事三亦爾心性寂滅法界無事含於三世內外疏云無常已滅名過去若未生名未來已生未謝名現在自身名內他身名外或五根名內五境名外及以二無作此是論偈也色攝十一法二無作者論云及以無表色以無表色與無作義同故記主變其言也疏下文云善無表色惡無表色故成二無作也攝諸心所善惡通大地各十心所輸門委輸族持性等三義釋界族者十八界同類因各生等流果生法之本有十八類故名也持者地能成持用水能成攝用火能成熟用風能成長用性者出體也地堅水濕火煖風動並疏文也二十二門謂三世門內外門麤細門勝劣門遠近門等非三聚攝無為法非色心等聚攝無為在下二乘境乃至復在禪境不相應行有十四種若無為若得非得若滅盡定若無想定在下三境中餘者並在今法入中攝故云並在此一謂毗曇王數同時毗曇本是異時成論本是同時而一異與上不同者或寫誤或別有意華他上胡罵切下音陀漢時人一綖音延非應作綫張顧之徒梁張僧瑤晉顧愷並名𦘕之人玄文對信十乘對十信論因滅是色獲得常色受想行識亦復如是經中釋云色是佛性者三十二相是如來常色常不可改故說色名佛性如來真實之樂名畢竟受如來真實之想是為常想行者名壽命行因緣故得如來常住壽命識者乃是如來平等之心彼文甚廣今略節之令知佛五陰耳閉手手應作尸不與他同古人前五如是凡權後四如是聖實董卓孝獻帝相也此時以山東豪傑並起恐懼不寧乃徙天子都長安遂焚洛陽宮室發掘陵墓取寶貸汙妃至等袁紹如太袒將為人志大而智小色厲而膽薄忌刻而少威兵多而分畫不明後淳于兵攻之遂發疾死等罿音童車上網涿音卓羽葆車蓋葆即蓋也周禮孔義云羽葆鳥羽注於柄頭如蓋謂之羽葆亦謂之羽葆幢記鴿大論祇桓寺舍利弗從佛行有鴿為鷹所逐佛令舍利弗言此鴿子幾世作鴿舍利弗以宿命智觀至前八萬大劫未得脫離佛言此鴿於恒河沙大劫中常作鴿身經五百世中得利根是時佛出世度人無數佛涅槃後遺法在世是人作五戒優婆塞從比丘聞贊佛功德於是發心願欲作佛後三祇劫行六度行十地具足乃得作佛四時不同周書月令有更火之文謂春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞音昨楢音由之火冬取槐檀之火春蒐音搜索也謂索取物以祭夏苗為苗稼除害秋獼音尠殺也順殺氣冬狩音獸謂得獸取之無所擇因果之意果應作緣豈能令於性法門盡性下脫一善字縱燒惡譜縱下略一佛字具足應云縱佛燒惡譜古師謂無了因性據善人須有了因性今云無者涅槃疏妙樂記皆云無果果性耳相為能遷一者本相二者隨相本相者疏云已辯命根諸相者何頌云相謂諸有為生住異滅性疏云有為者所相法也諸有為者五蘊法因緣所造故色心等法從因緣生名為有為也生住異滅性者出體也謂能起名生能安名住能衰名異能壞名滅二隨相者疏云此生等相既是有為應更別有生等四相若更別有應致無窮彼復有生等相故是則相上有相成無窮失耶物為所遷物者論云命根體即壽能持煖及識疏云命者三界壽及蘊等法頌云此謂生生等疏云上句開下句難此者前四本相也生生等者四小相也謂前四相有生生等四種隨相故成有為也又云諸行有為由四本相本相有為由四隨相生生等者等取住住異異滅滅上生字是小生下生字是大生小生生大生故名生生小相中住住本相故名住住小相中異異於本異故名異異小相中滅滅於本相故名滅滅於八一有能此通無窮難也豈非本相如所相法一一應有四種隨相此復名四展轉無窮為通此難故有斯頌謂四種本相於八有能四種隨相於一有能功能別故無無窮也且如生相生色法時九法俱起一是本法謂色自體此上必有四本四隨故成九法於九法內生不自生能生餘八本相中住住餘八法異滅亦爾故四本相於八法中有功能故此九法中生不自生是生生生住不自住是住住住異滅亦爾故本相中異不能自異異餘八法本相中滅不能自滅滅餘八法四本相於八法中有功能故四隨相於一法有能謂有功能也由此道理無無窮失也已上並俱舍文今更寫才法師注釋文於下彼云剎那得得少多義開為三初約一念三得者論曰以法生時并其自體三法俱起第一本法第二法得第三得得謂相續中法得起故成就本法及以得得得起故成就法得法得得本法即是大得得大得時其得即小法之得故得之得故皆依主釋大得力強成就二種小得力劣唯成一種故一剎那三法中大得二小得一也如是若善若染汙法一一自體三法俱起第二剎那六法俱起謂三法得及三得得第三剎那十八俱起謂於第一第二剎那所生諸法有法得初念三種望第二念中起三大得得前三法起三小得得三大得故成六法第三念中通望前二謂初念三法第二六法總成九法今第三念起九大得得前法起九小得得九大得故成十八也二二念九得者準此所論然初念善心三法俱起者唯說善心不說相應第二六法者唯說第二念起得得初不說第二自所起者善心亦有三法謂善心及大得小得并此第二念六法便成九法第三念等准此說三若約所相能以論即第一念有二十七具起謂本法為一此上有四大小相并前成九同一大得得之此大得上復有九謂大得及四大小相此九即以得得之其小得上又九謂小得及大小相此用大得得之故論又云一切過去未來煩惱及隨煩惱并生得善剎那剎那相應俱有無始無終生死輪轉有無邊得也上注大小四相者大則四本小則四隨詳解如論謹示剎那一念三得二念九得圖子前之三教或推遠理藏通真理自天而然惑不能染如靈外月別但中理在九界外地前仰信真中二理皆本有之故云遠也或約事行如離婆多見二鬼爭屍自推我今為有身耶為無身耶又槃特掃之類皆自行也或約俗諦出假之人如歌利王彼割截身體無我人等相又如菩薩施手時願得信手施目時願得智眼等不同俱生及現行第六識與色俱生現行非同種子眠人亦有不睡時睡應作夢觀於一句生三十六法前略引論中二法第三第四準此可解亦滅亦不滅自生亦滅亦不滅他生共及無因例作又非滅非不滅自生非滅非不滅他生共及無因亦例作之結成不思議乃至結成修德境近人云性德境不觀況當文自云若不推撿何殊鳥空請讀若不二字又云如前理性本無性過約修門說須明離計約修推性文自分明何須固惑又有人或將三境對於三即或對三根非矣今謂只是修觀一人以智照境境發於智若破執以為人演說名化他境義雖有三旨歸是一又有人云性德不觀謂本自二空也修德須觀謂推撿入空也若爾乃是修德自推修德耳又有人云性德但聞即悟引除病品云直聞是言病即除愈若觀性德悟乃是服藥除病耳且除病品文乃是大綱分利鈍二根及信法兩行何甞分對修性二境縱將性德以對信行不須修觀者且法華文句辯三周根性不同喻云如三刀斫本利一中二鈍三記釋云此中聞悟似是信行非不兼法值佛聞悟信尚兼法豈有末劫根鈍障重聞而悟耶此大不可又有人云性德不觀何以知之荊溪云理則直達法性今問直達之言是修觀否若不修者能達之心又是何法請熟思之今試陳之夫性德者眾生之性常諸佛之果理三世菩薩之妙依止地或析骨書經或剜燈乞偈藥王燒手普明刎頭只為求此也十方如來千萬億劫說不可盡者蓋是此也眾生久劫以昏散故迷於性德今大師令以止觀觀於昏散昏散之性執若去明靜之性德自彰況復昏散本無今有圓覺經云一切眾生於無生中性德妄見生滅性執如來因地知是空華即無輪轉亦無身心受彼生死非作故無推撿入空本性無故本自二空況又修性之言散在廣文今且引一十五文以證性德須觀先引佛言首楞嚴經云譬如琴瑟箜篌琵琶五陰雖有妙音性德若無妙指必不能發修德若更開喻合法使三境具足者琴聲不從絃生不從指生不從絃指共生不從無因生有因緣故亦可云從絃生從指生等化他又大經云有國王愛箜篌聲遂斷絃求聲聲不可得有大臣云取聲之法須有方便聲乃出耳眾生佛性亦復如是無有住處性德以方便故推撿乃可得見成菩提道即發初住華嚴經云應觀修德法界性性德也一句之中文略義廣下去準之觀經云正念思惟一實境界大經云能觀心性名為上定大師云本性寂滅性德若不修道修德無由契會又云境雖無相常為智緣又初緣實相造境即中又云正法者即觀法性之慧也又云初心研理稍入相似荊溪云由修照性又云智能顯理智生則理生又云智能照境又云一心三智照中道理又云一念心具十法界還觀此心具足三諦上所引文意須觀性讀者思之為徧責故論中三十六問一一問中但以自生一句而責耳如云問觀自生心云何四不說又云問觀自生心云何是魔行等今言徧約四性者是舉一自以例他及無因也故次云直舉自等責推也於三十六境以四性推撿令空所推之境論云云何是魔行云何是外道云何是三乘云何巧度云何是別教是圓教云何是四三昧云何是二十五方便云何起十境成一心三智云何十境成十乘法乃至坐道場降魔轉法等以自生一句責於魔外三界六道三乘四教十境十乘從因至果若四土等故云徧也是三十六境從自生耶他生耶共無因生耶徧生法故徧責為破徧生為立是知四性破已若魔若外若教若觀若正若依若因若果一皆是法界大都冥初外道計八萬劫初始能生覺八萬劫外冥然不知翾許緣切夢非夢短多一短字齊物莊子有齊物論謂以性均故齊若均山毫齊物云天下莫大於秋毫之末而太山為小注云夫以形相對則太山大於秋毫也若各據其性分物冥其極則形大未為有餘形小不為不足苟各足其性則秋毫不獨小而太山不獨大矣毫者兔毫在秋而成故王逸注楚辭云銳毛也兔毛至秋而細故以喻之為小也等鳧鶴外篇駢拇云鳧脛雖短續之則憂鶴脛雖長斷之則悲注云各自有正不可以此正彼而損益之又云故性長非所短性斷非所續無所去憂注云知其性分非所斷續而任之則無所去憂而憂自去也鳧野鴨也脛形定功釋名云莖也直而長如物莖莊子喻意謂鳧脛本短或截鶴脛以續鳧脛則有乖性分也斷丁管切福有五種尚書鴻範亦爾字從于月反只合云字從月今似多于反兩字如此曇此應作比有因緣不可見經中八種皆是因緣如云遠不可見者如空中鳥迹亂想故不可見如心不專一障故不見如雲表星多故不可見如稻中麻相似不不可見如豆在豆聚今記中文與經五文少異故撿經以示之損之又損之以至於無為損謂銷損皆道德經語耳恣之使天下自得注云夫至仁者百節皆適則終日不自識也聖人在上非有為也恣之使各自得而已耳自得其為則眾務自適群生自足天下安得不自忘我哉各自忘矣主其安在乎斯所以兼忘也止觀輔行傳弘決卷第九見品見品次見應作思字多入空少入假下文勝別觀又云多入假少入空中等不合不散前文已注今云合謂一念真空也散謂三千俗假也法性清淨中理也若未破故故應作者若十六行為三三昧門苦諦下空無我是空門滅諦下四行是無相門集道下八行并苦下兩行是無作門具如下釋以智慧為門云云者一權智為實智門二實智為門通至實相事通於理也以理為門云云者文在法華疏彼云實相為門有二義一當體虗通為門如淨名不二門華嚴法界門二能通方便作門引劉虬云通物之功乃由乎一故一為方便作門如三乘皆從實相流出如星之月之應作中吹唾大品經云三千大千世界中諸火一時皆然譬如劫盡燒時菩薩摩訶薩欲一吹令滅當學般若論三十二釋云火多無量口風甚少何能滅之答菩薩行般若波羅蜜時因得神通能變身令大口風亦大故能滅之又以神力小風能滅如小金剛能滅大山菩薩以火為害處廣憐愍眾生故以神力滅之此是事釋也若就理解三千即空一唾也三千即假一吹也即唾即吹同時者即中也名一眾生或多一字或一字應作為不出自他智斷等四句中前三句是能是自後生生一句是他是所所破惑是事能破空是理於六句中判前三教解惑是思議圓教解惑是不思議智斷可見不至至經云不至者是大涅槃凡夫造罪故未至不至也不至至者名大涅槃不造諸惡名不至至至不至者至者名二十二五有菩薩永離故名不至為度眾生故亦名至也至至者至名二十五十有凡夫初二三果煩惱因緣故名至至如來證涅槃等四句疏釋云不聞不聞是涅槃無始無終不生生是涅槃無始而始生不生是涅槃無終而終生死亦然生生是生死無始無終不生生是無始而始生不生是無始無終界性惡五陰是也例此以釋不生生亦應可見不生生是了因性生不生是緣因性不生不生是正因性生生是境界性依章安解復是一塗章安云初句證智次句明證理第三句明證斷第四句明證應復次不聞聞是證聖行聞不聞是證梵行不聞不聞是證天行聞聞是證嬰兒行又云不聞聞是圓淨記主一塗之說意云並不似智斷因果釋也別作一途大都四句攝諸法盡今且以四句說無生破徧之一途耳地持六住論中本有十二住今且引六耳十二住如備撿第四卷末即吹而唾諸法不生即唾而吹果由因剋吹唾成就智斷圓前釋生生指有漏法前云生生者一切有漏念念生故明化用之所耳五行竟次明十功德云十事功德等十事功德在高貴德王菩薩品中經中涉五卷解釋一者不聞者聞聞已能為利益等二者修大涅槃昔不得而今得之三者得無緣慈四者唯修九事不修淨土五者諸根完具乃至十者入大涅槃等具如備撿錄出也始從初心終至地前涅槃疏云五行者始於初心終於初地證天行故也今云地前恐寫誤若作別義開善最親記主一往許之以其有從淺至深之義故也若據章安所斥未全為當疏文云第九功德初發五事悉得成就此不應深聖行以大涅槃心修嬰兒行云得涅槃此那忽淺若作圓義光宅似當光宅云五行十德體一義異同是因善起自外凡終於窮學感於習果謂之為行酬前習因謂之功德乃是行因德果也記主以其於外凡聞涅槃理亦一往判為圓章安引光宅云習因習果乃菩薩之位不開佛乘故記云似當耳豈比法華五乘七善一例佛乘耶然涅槃自有次第五行故今少分許之為圓若據經中先明五行次說十德則五行多分在因十德至地下記中自釋云約次第邊由五行滿得入初地初地是第一功德乃至以十德對十地若作總別解者始從初地至第十地恒具五行及十功德十德對地又復宛然非分別智能知疏中無非字泥洹智不洎洎應作測非有故非邪邪應作斜白銀琉璃漸漸互現長阿含云從月初一白銀面現至十五日銀面全現琉璃全隱從十六日去琉璃面現至三十日琉璃全現白銀全隱經中又云十六日去黑衣侍臣一兩上侍至三十日諸臣併上故稍稍虧從月初一日諸臣漸下至十五日諸臣都下故稍稍滿又云日天子放六十種光奪月故虧若月天子處正殿後光對日天子是故盛滿耳六處結撮以破見等文相周備似次第意故六處示妙使知文旨冥初世性二十五諦六諦並在諸見境列釋大論總以十四難而攝六十二見謂三世各四句并根本二有此難者不應為答十四難者謂世界及我常世界及我無常世界及我亦常亦無常世界及我非有常非無常又世界及我有邊無邊亦有邊亦無邊非有邊非無邊又死後有神去後世無神去後世亦有神亦無神去後世非有神非無神去後世是身是神身異神異外人曰若佛是一切智人此十四難何以不答答曰此事無實故不答諸法有常諸法有斷都無此理是故不答譬如人問𤚲牛角得幾斗乳是為非問故不應答以有邊無邊對無想為四句謂有邊無想無邊無想雙亦無想雙非無想但改無想以替有想謂有色無想無色無想等一切論可破等等者又云一切法不忍今文若加此一句方可見責云汝見是忍不三四中單複具異單中雙亦雙非各一人複中雙亦雙非各兩人具中雙亦雙非各四人應云亦有亦無有亦有亦無無論中却云亦有亦無亦有亦無雙非爾假立於己若云假立己稱則易解若竪待者以己他相待是橫若竪待者以身待不身不身待身亦名己他又以滅待不滅論己他三無為俱舍頌云無漏謂道諦及三種無為謂虗空二滅此中空無礙擇滅謂離繫隨事繫各別畢竟礙當生此中空無礙謂太虗空乃至窮隙等疏釋云此中者於略所說三無為中虗空但以無礙為性由無礙故色於中行又云道諦是有為無漏三無者是無為無漏今記云謂太虗空為性等者乃是記主釋耳非彼疏也意謂無漏之法是無礙性非是頑空乃窮隙等之無礙也擇滅謂離繫出擇滅體也擇滅以離繫隨事繫各別三界九地各有九品煩惱九九八十一品斷一品惑證一擇滅是則八十一品擇滅故體各別畢竟礙當生釋擇滅也言礙當生者此當生法緣會即生緣闕不生於不生時得非擇滅此非擇滅礙當生法令永不起名畢竟礙別得非擇滅者謂非擇滅有實體性緣闕位中起別得得故非擇滅得不由擇但由闕緣名非擇滅如緣一色時乃至礙餘色等如眼與意識專一色時所餘不見聞等色聲香味觸落謝過去也於專一色時合有一類五識緣彼已謝五境由正專一色餘五識不得起此未起五識畢竟不生謂五境已謝故五識唯現在不合緣過去境故未來五識得非擇滅言觸等者等取法界中有與能緣同時為所緣境謂他心智所緣心所也五識等等取意識中亦有能緣同時所緣境也謂他心智唯緣現在緣心不緣所緣所不緣心正緣心時緣所他心智得非擇滅正緣所時緣心他心智得非擇滅此約同時合緣者說也已上皆疏中釋優陀那風觸七處如箋難引相續名住住應作假以此為彼若類上文應云在彼則以此為彼耳故滅得生滅恐應作識生思上文云無緣思不生言集散者散所集故大論云生時無所從來散時無所去處是諸法皆如幻化無來處故集不可得無去處故散不可得又生無故集不可得滅無故散不可得畢空故集不可得業因緣不失故散不可得七者彼彼空空中中最下無復彼此楞伽第二云第一相空謂一切法自相共相空分析推求自他及共皆不生故第二名自性空謂一切法自性不生第三名無行空所謂諸蘊本來涅槃無有諸行第四名行空諸蘊由業及因和合而起離我我所第五名一切法不可說空謂一切法妄計自性無可言說第六名第一義聖智大空謂得自證聖智時一切諸見過習悉離第七彼彼空謂於此無彼譬如鹿子母堂無象馬牛羊我說彼堂空非無比丘眾非堂無堂自性非謂比丘無比丘自性一切諸法自相共相彼彼求不可得名彼彼空此彼彼空空中最麤汝應遠離別在有情心所滅故受想等滅是有情異無為之非情又不與彼闕緣義同如緣色時餘塵已謝謝名闕緣則餘聲耳識等不生名闕故但與彼生滅義同今相待假於所緣處心有生滅若非擇滅中眼識對色者則生餘聲香識則滅此之生滅與相待中生滅義同三無為法通是無生無生之義雖同而異若擇力所得滅此是真諦理之無生也若闕緣等有礙而不得生者雖名無生此非真諦故曰通如前總後亦判利鈍破有見前總論止觀若歷三假得入名利若不入者應回轉六十四番名鈍故此等總引大品楞伽等三總文即同初文前於單見名之為總於單四見前用止觀二法彼假入空彼雙寂畢竟清淨之止能觀所觀猶如虗空之觀文在四見之前故云總對四見名之為總今於一見對別名總前單四見之初總對四見名總亦可名為總中總別今無見中又論總別亦可名為別中總別不同有見因成末文總別彼文云性相俱空者是為總相從假入空觀粗免夷愆若云我知是我見是是大妄語犯波羅夷從有人下難中論師寄非辯異此中分科或恐誤合在下文也若此中分科應云破無生為二初正破次有人下難中論師初文二初徵起三結一我見二非因計因三疑我即身見非因計因即戒取下第十記初釋衛元嵩破壞佛法上表滅佛法有文在下押押應作壓之與華恒恒應作垣垣墻也無為無欲之語老云損之又損以至於無為又云常無欲以觀其妙常名常道之說老云名可名非常名道可道非常道守雌老曰知雄守雌守弱剛強者死之徒柔弱者生之徒患智智慧出於大偽又云絕聖棄智患身吾所以有大患者吾所以有身身毒音篤苦縣苦音戶諡老聃聃字是諡老非諡柱史在帝王柱之傍為史官莊任漆園史記云莊子蒙人乃梁國蒙縣人也為蒙之漆吏終身不仕以快其志著述改足足即喻反軋軋若抽思軋軋若其抽如抽絲也止觀輔行傳弘決卷第十於大助中助應作即贆音標蜬又音含五部部類也四諦下惑為四九地思合為一共是五部也一月二時一月兩次行欲可以養生三種色記引大論次引大品文意是同搜要云大品過一切色是滅可見有對色也滅有對色是滅不可見有對色也不念種種色是滅不可見無對色也初色是色次色是五根四塵第三色即法入少分無表色也空觀成時無表亦破五根四塵五根有對聲香味三不可見無教無表之名故後兩番如論借別名通菩薩位中一番約三地不出觀斷見又一番約忍智四地不出觀斷見初十二有八謂初地有十功德二地有八功德三地有五功德等三五四有十三地行五法四地不捨十法五十二六六五地遠離十二法六地具足六法七二十八五七地不著二十法八地具足五法九十二十佛九地具足十二法十地當知如佛十五心雖已有七智八忍未入果位故道比忍猶名為因世第一後無漏因緣引苦法忍初心入見道有無漏法生名苦法智忍此剎那心斷苦下十惑一心次起一剎那心名苦法智擇滅無為二心次觀上界苦名苦類智忍三心斷上界苦諦下煩惱法後得苦類智四心次觀欲界集集法智忍五心集法智六心次觀上界集集類智忍七心集類智八心次觀欲界滅滅法忍智九心滅法智十心次觀上界滅滅類智忍十一心滅類智十二心次觀欲界道道法智忍十三心道法智十四心次觀上界道類智忍十五心已上名未入初果已前七智八忍此十五心後無間道斷諦下見惑名初果向次起一剎那道類智是第十六心大論五十三云爾時須菩提作是念論云爾時眾中天人菩薩作是念般若波羅蜜三世諸佛皆從此中生須菩提小人云何佛讚欲說般若波羅蜜當如所說是故言須菩提所說皆承佛力云云今記中文略云須菩提作是念者本是人天菩薩念耳依梵法治眾僧默擯隈水曰港派水曰港隈字恐誤不知三空所施物空能施人空受施者亦空乃至般若亦須知三事皆空所觀之境空能觀之智空及能觀之識空中間尸忍進禪皆須一一三空故云乃至俱舍頌曰但由悲普施被析身無忿讚歎底迦佛次無上菩提於如是四位一二又一二如次修圓滿初一謂布施次二謂戒忍次一謂精進次二謂禪智如次對四句撿疏略消但由悲普施者明施也若施時乃至眼髓而無悋惜但由悲心非求人天生也此明布施滿也被析身無忿者明戒忍二也若時菩薩被析身支心無少忿析身不報戒滿心無忿忍滿也讚歎底沙佛者此身明精進若時菩薩勇猛精進見底沙佛忘下一足經七日無怠淨心讚佛云云此精進滿也次無上菩提者明定慧也金剛喻定隣次成佛名無上也此定慧波羅蜜多滿也如是四位者初是施位第二無忿位也第三精進位第四次無上位一二又一二者一者初施位一波羅蜜多也二者無忿位二波羅蜜多也又一者精進位波羅蜜多也又二者無上位二波羅蜜多也如次對四句是記主言非俱舍語且寄一法破假一法開十六門離邪曲誤內正直是外邪曲非孟浪行說孟浪莊子釋云率略也文選注云鄙野也南山云高談虗論世表有餘攝心順教一事不徹今以行不符其說非孟浪是何並如初釋說身無常是經不同凡夫等計以為常淨名疏語不說厭離是經不同二乘是疏並如初釋者亦應例云說身有苦不同凡夫計之為樂說身無我不同凡夫計之為我說身空寂不同二乘一向入空從現入過淨名疏云若毗曇明三世有罪從未至現世入過去得繩繫屬行人若成論明三世無罪但隨心現又正理論云諸有為法差別作用未已生名未來此纔生名現在若已息名過去論入假四法入假意有入假因緣油法釋第二句謂身力雄莊乃至無能當者善八種術謂吐下塗身灌鼻熏洗丸散又有八謂治身治眼治胎治小兒乃至知星辰故在七地十功德對十地今七功德知是第七地飯牛飯上聲書注云以雜草飼牛舜膳膳應作禪謂舜禪位與大禹禪或應作單音丹伊尹邀相好大言之語記主引之耳文在史記殷紀中孟子不取孟子曰伊尹耕之於有莘之野祿之以天下弗顧妄語亦爾徧於諸根不見言見不聞言聞乃至觸言不觸鄭衛二國名以二主婬亂乃變雅樂為婬樂今之俗樂是也詩序云亂世之音怨以怒其政乖亡國之音哀以思其民困擊缶亦非古樂今之打水甌者是也缶燒土為之八音中謂上恐是吹塤耳論有信解見得前破見假有信法二行在初果前若入初果轉二行為信解見得文中並皆云四悉是惑者以菩薩出假二乘之空是所破故爾獶奴巧反墨劓剕宮大辟墨則黥額劓則削鼻剕則刖足宮則男子去其勢女則幽閑之大辟死句芒等春神句芒夏神祝融又后土秋神蓐収冬玄冥句陳星名也其星有六在北極紫微宮中不可違爾搜要云不可率爾中問比說如汙穢陰凡夫計堅得觀名瀾如汙穢骨得觀名散不可違深致者九想是因緣生法即空即假即中九名法界攝一切法以教意釋出湯有半熱半冷可別能蠲渴消煩如空慧破見思此生滅也吐物可出藥力所致令腹中淨如無生也灸則一穴針則多處治徧四肢如無量也丸散今無眾藥合就因緣生法即假中無作也苦集不同集作記時論中集上有苦字今論中削去也扁鵲扁婢典切後語即春秋後語史記云勃海郡鄭人也姓秦名越人腠理脊骨邊司命所及扁鵲傳云雖司命無可奈何司命者主壽命之神也儜女庚反佛教明劫佛經名混沌之名今借混沌名耳失譯失譯人名也此經又名優婆塞行經然亦獨此經有孔子名也至若須彌四域經并灌頂部經皆有名驗大師所指不繆唯識所計識論師計三無二有須彌山者三界也從一須彌至一須彌喻從空門至無相門從無相門至無願門以次文云欲從菩薩三解脫門遊於無量佛法楞伽授聲聞記經有問答無授記語三變化佛授聲聞記非法性佛變化佛者應佛也法性佛者法身也法身無授記事故次云法性之身尚不記菩薩楞伽云法佛說法者離心相應體故內證聖行境界故是名法佛說法之相等以說法例無授記可知淨名大品皆應有之淨名眾中小賢聖皆如亦應得受記大品記三百比丘從是已後六十一劫當得作佛皆號大相等此是記未入餘界者也方等云第二第三授我等記經云昔於王舍城授聲聞記今復於舍衛國復授聲聞記昔於波羅奈授聲聞記乃至云第二第三授我等聲聞記文殊語舍利弗言枯樹生枝不焦糓更牙不夫授記法如虗空無色無形如來以如如性授汝等記不即如不離等今詳是授聲聞應佛記非法性記況又是斥奪之意耳初意自為已入滅者入無餘界入方便土人也斥鈍根菩薩求聲聞涅槃者除初同句論除了更加假中加了老子化作佛老子謬說化胡王成佛已自非矣今云自化佛更非也又是一訛說耳釋迦本出周昭王時老子出周定王時相去三百四十五年又何甞化胡耶釋迦既非胡人又不曾為王有云老子死葬在扶風扶風秦地也莊子云老子死秦佚入吊三號而出史記云蓬而行不知所終驗非化胡明矣道士王浮偽造甄正論又云宋文明造今詳造化胡經時非一人也王宋二人若知老子有西升經云吾聞竺乾有古皇先生不生不滅善入無為吾之師也吾今將升就焉則不敢偽造化胡經也萊茯根章安云爾雅作蘆菔郭璞蘿茯蘆音盧菔音扶福切止觀輔行傳弘決卷第十一佛果不出二諦外前二論之未釋設應作謂弓刀槊音朔文意大同須釋出之經論生緣同亦可見法緣者經云一切法論四緣空謂羅漢支佛諸佛及菩薩聖人皆從空性中生破我五陰法一切法即四緣等也經云不住法相即論中不住有無法同乃至十二因緣七覺八正皆以慈為本經云修習慈心能生無量善根謂無常生滅生滅四念處七方便十二因緣煖頂忍世第一見道修道正勤如意七菩提分八道四禪四無量心乃至三昧智他心智神通智本際智聲聞智緣覺智菩薩智佛智如是等法慈為根本耶云云翼從從去聲輔翼侍從者謂呼是血呼謂是血寫倒舉石空中力士驚怖佛欲入涅槃始入拘尸那城五百力士平治道路有一大石眾不能舉佛以足指舉此大石擲置虗空令諸力士貢高心息現作莊嚴降諸外道佛一日至首波羅城彼城人民信於邪道見佛欲至出城斬伐林木所有流泉填以臭穢各嚴器仗莫令得前佛生慈心林木還生河池清淨變其城壁為瑠璃城令狂女人見如己子舍衛城有婆羅門女唯有一子遇病命終女人愁毒入心狂亂失性裸形無耻啼哭失聲子何處去我於爾時起慈悲心是時女人見我便生子想還得本心矣患瘡女人得藥平復波羅奈城有優婆夷見一比丘有病毉須肉藥時女人割其股肉因是患瘡佛起慈悲是女尋見我持良藥塗其瘡上還復如本猶如猛火不能燒薪薪火然薪壞故名為燒疏中不解今詳不燒薪者恐是木中具猛火性耳何以知之次句云火出薪壞知不能燒者是火性也記云火然薪壞語異意同異法出生經云異法出生異法無故異法滅壞疏云異法有故異法出生諸法皆為因緣所起因緣於諸法名之為異有異因緣便有諸法故云異法有故異法出生如葵藿以日為異緣芭蕉以雷為異緣眾生以法身慈誓為異緣亦爾若無佛慈眾生終不自能覺悟如磁石吸鐵論泉池萬派所聚也故海名朝夕池又名醎池如不應同同應作異疏云若眾生如不生不滅不得受記彌勒如亦然若彌勒如不生不滅得受記者則二如為異異則非如若如無異記則應同我等所行呪術經書若讚頌時瞿曇所有功德入我經中來者是瞿曇實功德何以故瞿曇父母真正法輪文殊欲引尼乾子亦先學彼法後導歸佛道今記文少誤經云爾時文殊師利童子及五百化弟子聽次第坐受用尼乾戒法威儀殊勝於彼時時讚說三寶功德亦復讚歎薩遮功德令彼諸人心相親附復於異時知眾已集文殊師利便作是言我等所行呪術經書毗提遮經若讀誦時沙門瞿曇所有功德有入我等經中來者是沙門瞿曇有實法功德何以故是沙門瞿曇所生成就父母清淨轉輪王種以百福相莊嚴其身云云轉正法輪經作轉輪王種耳引難況易明中道之難引空假之易旃檀如法性故似多故字足故大經足應作是旁牌周禮司兵掌五盾盾者于櫓之屬所以扜身蔽目也見鶴經只作鶴餘之六句準此說之言不常者一切邪見及四性等常與無常皆不可得不生無常何得有斷斷無常故故常本無餘例耳從始至終並有橫故始從破假入空終至破邊入中此之竪門並橫者如一無生門則三諦皆無生乃至三諦皆不出無明滅生還以無明法性相對論滅若無明滅而生法性者則無明是自滅而法性名他也若無明不滅而生法性名他滅者以法性生時而無明即滅名為他滅通舉始終行位生死始涅槃終行則觀成破惑位則三根出假等論不住色布施金剛偈云遠離取想論云不見施物受者施者無著云不住相想以心境俱空則微細相盡袪更說不垢不淨經云垢淨為二見垢實性則無淨相順於滅相是為入不二法門亦名却入未前進故搜要云行計未窮故名却入自未極故不同小乘隔世報故小乘但有習果而無報果今云隔世報者以大則之生變易報但觀欲等心王搜要云前云識者是諸心家之識今云欲等是識家之諸心具如向簡雖即屬陰攝陰不盡而論總別識心是總欲瞋慢是別而論麤細五陰但一色是麤入中開色為十入半則細陰中四心則麤界中開四為六識等則細報非報別三科皆報所發者非報論云若捨分別即知障清淨記云故知分別實不可捨者以小乘人滅相滅心而捨分別既無分別不能悟大今指分別即是法性故知分別是悟入門悟入之時是捨分別捨名雖同大小永異初觀始於凡地無位可論如三藏內外凡未證空時何所論位四地名須陀洹等此通人也四見地三八人初應是慧性二地上上根也此三根人證空位九夷等四四者謂九夷八狄七戎六蠻謂之四海注云九夷在東八狄在北七戎在西六蠻在南夷字從人執弓狄是犬種戎人荷戈蠻亦蟲種皆無禮教故以夷狄之字賤之夷有九者一玄菟二樂浪三高麗四滿飾五鳧㬰六索家七東屠八倭人九天鄙餘狄戎各有名觚竹等四四者謂觚竹北戶西王母日下注云觚竹在北北戶在南西王母在西日下在東皆昏荒之國次於四極論徑𠈰語出莊子彼云肩吾問於連叔曰吾聞言於接與大而無當往而不反吾驚怖其言猶河漢而無極也大有逕庭不近人情注云上古定切下透定切逕庭激過也謂言語宏大不近人情彼云激過今云越次義亦同一切種智故云空觀空本一切智耳搜要記中無種字五下分有身見戒取疑妙樂記云此三徧攝一切見惑問下分有五本是思惑何故三分屬見答此惿舍中明隨眠煩惱乃於辨九結中云見結者謂三見二取三見有十八物二取亦十八物見十八者苦下有身見邊見四諦下各有邪見合成六見三界各六故成十八也取十八者苦下二取集滅各謂見取道下亦二取故成六取三界各六名十八取三見是所取見取戒取是能取預流斷三結者頌云攝門根故三言攝門者謂身見在苦門戒禁取在苦道門疑通四門斷三結者攝彼三門言攝根者謂邊見依身見取依戒邪見依疑故斷三結攝彼三根若據此文釋五下分酌然三結屬見明矣若大師判為思惑者通總而舉之耳而別取貪瞋二分攝欲界思也五上分文但列四須加無色染也俱舍頌云色無色二貪掉舉慢無明疏云一色貪二無色貪三二界掉舉四二界慢五二界無明由此五種能令有情不超上界名為上分以貪過重兩界別論皆有能所緣無明緣法性真緣為所以所顯能若境若觀俱有心法咸須撿梭此是通結也若觀則能觀諦緣度之心若境則所觀諦緣度之法恐行人於通起塞故須撿校體法觀亦爾故云下去若例上三諦之言觀則三諦之心境則三諦之法亦爾百千萬億萬億下必闕眾生字從根利鈍故使出界經劫長短須陀洹歷後位入般則鈍斯陀含人其根少利一呼善來便證二果阿那含人其根有利不歷前二阿羅漢人其根大利不歷前三故使從本為名經劫長短不與唯識義同唯識云三人永不發心上菩薩位上應作至與無量一人避走寄犯國法者喻之前破徧中既已結成出其元意等搜要云前破遍文已成一心此中亦應只存一心亦以次第成前次第自以一心成前一心云云意云前破徧義便是一心此中只應存於一心不須云破徧也以文次第故節節如是耳舉破徧等例之可見前三破徧為成一心破徧至下度入方始以竪而入於橫却指前文以諦緣度橫入空假中故使三橫織竪成竪三俱初發前大品三人初發心者破神通者有師謂止觀大意一章并章安釋十二部經觀心一句是頓頓其論十乘漸頓故義例敘他問云圓頓止觀是何頓答是漸頓何以得知如第一卷以三喻喻止觀以通者騰空喻於圓頓至識通塞中破於神通神通被破故非圓頓師資不成三種止觀本傳之南嶽今借此文經中本喻人身難得如瓜上土耳幾法現前現前是三昧成就初義證成如大論云修八正道得善有漏五陰等論中但引一文釋於念處使成三諦準餘處釋趣義此中文略應云一切法趣念處是趣不過念處尚不可得何況有趣非趣釋成三諦者一切法是能趣念處是所趣有能所是俗念處不可得是真非趣非不趣是中論一種即佛種性相體文句釋種三道是三德種此性種也低頭舉手等是類種相體性即十如中前之三如是是三德之異名安我頭南首面向北甞撿經非誤二住已去乃至明別初住是圓二住已後復存隔歷者釋籤謂是圓接別性無住住經中佛言凡言住者名為色法從因緣生故名為住因緣無處名無住住如來已斷一切色縛云何當言願如來住以五陰四念三德四德前論云轉色成法身法身常樂轉想行成般若般若即淨轉受識成解脫解脫則我又依念處轉識成常轉受成樂轉想行成我轉色成淨也
