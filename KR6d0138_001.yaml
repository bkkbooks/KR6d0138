body:
  text: 止觀輔行傳弘決序文雖不講義要略識今取義之隱者注之宗虗無者老耽名教之道廢五經是冶化之本而老子槌提仁義絶滅禮學此則名教廢遺文字者莊周述作之義乖聖人之書詮於至理而莊子以為糟粕喻無味也此則述作乖古先梵王謂佛也尚書序云古先哲王今借其語勢乘時利見易曰利見大人德音莫違語出毛詩今借謂三乘聖賢因稟佛教而各有證悟知幾平聲謂幾微也學者少有知微窮年默坐不咨師友甘心自愚白首論心膠著文字不能融會捫象大經盲人摸象喻也以尾牙等為象身乳色大經盲人問乳色喻也聞雪粖謂冷軟等本末誰迹色末空本俱無足迹又何用教乘乎陵夷陵山也山本峻峭及至地則平夷喻大道將滅沒也橫流水本朝宗法歸圓極水若九州而橫流法喻諸師而各立大禹治水天台談圓故曰大拯覆簣論語孔子曰譬如平地雖覆一簣進吾往矣注云雖覆一簣我不以其功少而薄之簣土籠也譬為山者雖覆一簣而終成大山今喻大師力行於南嶽禪師絶維維綱維也綱維若整網目必齊今以中智二論為宗骨也文選云漢綱絶維命家作古命名也名曰性宗自我作古立極建言極者圓理言者大教引而伸之言出論語謂章安記之又從而添削之欽若若順也尚書曰惟臣欽若不愆于素不失昔願也法華尊者本徐陵後身獨斷斷字去聲遑恤我文毛詩云遑恤我後遑何恤憂也荊溪之前諸師但説釋而已何憂止觀文理他人不解哉載揚音揚謂搜𫾻其旨總角上音總以物而束髮即丱角繹思音亦繹理也理其情思尋義理也説文云抽絲也旁薄易繫辭中旁薄者謂混同也不野不鄙野錯綜下去聲謂織縷也經緯錯而成文左傳曰錯綜經文隱括包括三多或云三止三觀所蘊法多或云三種止觀所蘊法多故曰三多更請詳之玄覽斯㳷玄遠也可以遠照至理文選眷哲玄覽㳷音誨行有岐路行去聲岐者修旁之小徑也岐喻偏小路喻圓頓二行不同也解無方隅老子曰大方無隅謂達者心無畔也今借喻上根達無方隅則入位深下根但結緣而已以舉其全以輔行二字扶一部之旨擊蒙擊去童子之蒙吝易曰上九擊蒙發覆發啓發也孔子曰不欣不發覆謂重審之師者當然孜孜勤勞貌孟子曰孜孜為善舜之徒也庶幾幾微也孔子曰顏氏之子其殆庶幾乎今荊溪造幾微之理幽贊幽深贊明也謂深明其道易曰幽贊神明而生著咨豫咨嗟爝火上音炬火也莊子曰日月出矣而爝火不息其光不亦難乎君山嶽州普門子俗姓何氏魏吏部尚書晏之後名普門止觀輔行傳弘決第一題下諸文注者亦多今刪取孤山四明注之亦少有補助決者明也斷也明斷義理呼之為決如大師禪門口決又儒書有鈎命決濟行之教有宗此釋輔行二字也記文即能濟之教止觀即所濟之行濟亦輔也變其文耳謂此記文津濟輔成止觀之行有宗者凡引諸經俱使歸宗一家所談觀法心具性具如不思議境引華嚴三無差別證心具百界之類信教堪輔行廣引經論一一宗歸寂照妙理使後學信受此記文可以輔止觀之行顯教之行符理此釋傳弘二字也止觀即能顯之行記文即所顯之教蓋荊溪自言依此止觀而求旨趣別顯諸經圓頓三之教下所詮即止觀所顯不思議理行何所弘徵問傳弘也能弘既立於行所弘為是何法非衆教不立此答釋也衆教即記文也今引衆教建立此記教何所輔徵問輔行也能輔既是於教行輔為是何法非妙行莫詮此答釋也衆教建立唯詮妙行也乃澌以三聞澌與賜同悉漬反賜盡也三聞者下序云聞深不怖聞廣不疑聞非深非廣意而有勇法智大師云三聞語出付法藏傳即再三之三耳傳云三聞説法悉能受持故荊溪云數聞師談衆教頻覽佛示群經全教行一轍教之與行同歸三諦如千車共轍若咨稟口決如下文云嘗於聽次咨決所聞若審理要決如釋色香中道用十義評無情有佛性等若設徵決疑如釋不思議境中問云但觀於心何須觀具等文皆為決文下之疑及釋文後設問等若取類決擇如釋發大心四諦文云道亦應四且據能斷界內苦集故但云二此即以道諦類例滅諦之義也若引廣決略五略修大行中無十乘若決略文須引十乘廣文以決之令四三昧一一皆修十乘也若攝廣決正止觀正明入道行門示於十界百界依正色心三千性相之廣博在乎一念而已若決疏文勢如釋不思議境中問云前引諸文廣明境竟此中只應明能觀觀何故復云明不思議答此是決通觀道又如釋十乘竟例餘陰入十界皆修十乘等若決通觀道如四種三昧各別何名為同記主自云此等並約所歷事別若能觀觀無非一心所觀之境無非三諦若案文判失如此記下文云有人云無漏總中三者即三觀也無漏空也總假中中自濫參聽衆有逾一紀未曾聞有斯異釋中即實相實有是同如何數為不同之限共有七不可若準部斷謬如釋略指在三大意在一頓及諸文後三一止觀結破異解三外別立一頓又他人云三外別傳心要等謬聊伸所傳傳左溪之旨非不廣也言聊者謙辭耳不遺先見推功於師知有師承非任𮌎臆傳通師訓謙非臆説而棄根本隨末見故如下判三種止觀云大意在一頓迷者謂三外別立一頓而與三不同又以法華為漸頓華嚴為頓頓義例云此所學宗同而稟一師文理相承終無異解如何得云三種止觀圓頓止觀是何頓答是漸頓廣如彼文破後代展轉隨生異見如下漸次止觀中有無漏總中之一句論中只是二乘開合之意人不見之便以無漏是空總是假中又安心中論結一向根性又相資并回轉三番根性共有三百八十四番安心此外又云一心止觀復有六十四記中云一心者依前重舉耳人見三番之外更云一心便謂頓等三止觀外更立一心等又如知次位初論中有十意融通佛法謂一道理二教門三經論是談一代化意後人不曉繆用以對十乘信宗好習餘方無師可承稟方法也如鼻隔禪師并一向止一向觀無四悉益乘壞驢車點示關節廣略起盡五略與十乘互論廣略若十乘中無四三昧則下文成略五略之中十乘未周則五略成略尚對三學疏云約己心論戒定慧為三分修行以戒初定中慧後若約法門以慧為本定戒為迹釋比丘位彼屬約教故疏云大亦言多亦言勝器量尊重為天王等大人所敬故言大升出九十五種外道故言勝遍知內外典籍故言多又四教中迭論大多勝三止如下釋名中有相待絶待三止三觀相待三止者謂息止停止不止止三觀者觀穿觀達不觀觀絶待者三止即一止一觀即三觀餘八是別八應作九此科判耳該乎長短攝彼精粗長短者如釋論云迦羅即短時亦名實時三摩耶名長時亦名假時亦可二十二年説般若是長時八年説方等是短時乃至一日説一經是長時一時説一經是短時精粗者説生滅時則粗説無生時則精等司官舍九寺也謂太常光祿大僕大理鴻臚司農衛尉宗正太府鑽仰論語顏子嘆孔子云鑽之彌堅仰之彌高無所知人得此謂為無生忍此但始得欲界未到定耳謂證無生忍義通而文別經中通序通一代今止觀只云止觀明靜乃義通一部耳意別而存通天台意別在止觀故若二十三師未必俱弘止觀但一往付法耳曰存通指龍樹是所承師而諸師尚通濫觴觴酒杯也文子曰汶山之陽其源可以濫觴謂泛濫只一杯耳言其少也衆名末教衆名者即種種名也經無名字第八云王既沒已其後是藥或酢或醎或甜或苦或辛或淡如是一味隨其流處有種種異次文云譬如佛性以煩惱故出種種味所謂地獄鬼畜人天男女四姓等今記云末教或恐以理為本以教為末又恐末字誤應作喻謂喻教多也然又經中本以種種味喻六道耳六道因迷佛性而有學者更詳青出於藍荀子云學不可以已青出之藍而青於藍冰水為之而寒於水注云以喻學則才過本性也又劉子云青出於藍而青於藍冰生於水而冷於水寒使然也鏡出於金而明於金瑩使然也戎夷之子生而同聲長而異語教使然也有覺德行詩云無競維人四方其訓之有覺德行四國順之注云無競競也訓教覺也人君為政有大德行則天下順先同後異世尊初學二仙但至無所有處又至非非想處此先同也後至尼連河邊即得涅槃此後異五人中三是父親謂馬星釋摩訶男拘利太子二是母親謂跋提十力伽葉著愛行者母親二人也以愛為淨見太子勤行苦行乃捨之而去著見行者父親三人也以苦行為淨見太子受飲食蘇油及暖水又捨之而去修禪著見行者句擭一獲反手取也耶旬舍利耶旬此云焚燒舍利又云骨身傳云千㲲身火耶旬之搜要記只作闍維舍利傳中分法此句恐誤搜要記中云付法傳中先分為三半河方及傳云阿難乘般在河中流分與二國上天下地一分與帝釋一分與龍王一分與阿闍世王一分與毗舍離國般遮于瑟此云大會傳曰王舍大城有一長者名商那和修入海採寶願作般遮于瑟為佛如來造經行處所為既訖可度出家乃阿難所度現五百法門法門乃是三昧耳傳云諸子見坐毱多牀已咸生瞋忿是何弊人處我師牀欲驅令出如須彌山不可動欲出惡言口自噤閉而弟子憍慢未息是時商那和修手指虗空便下香乳如是次第現五百三昧問其名字都不了知三昧力能現神通見淫女屠裂突羅城有淫女名婆須達多有長者子共淫女宿值有估客從遠方來大賫珍寶求女交通彼女貪其寶殺長者子埋置舍內其家眷屬至淫女舍埋地得之陳於王前王取淫女斬截手足劓其耳鼻等滿丈六室傳作縱廣六尺高亦爾多密加之潛化為弟子加被之故云密傳云有一尼乾邪見熾盛毀謗正法善能算數多欲化彼往為弟子就彼受術不久習學皆悉通達彼尼乾子出大惡聲罵辱於佛多云莫出斯言令汝墮大地獄若不見信汝可算之尼乾推算尋見其身必墮地獄即大驚怖以五百偈贊嘆如來改悔先罪多又告云以汝善業死生天上乾又下算罪滅生天等鳴欲刎首用謝罪也賴吒和羅妓彼國諸妓不解曲調爾時馬鳴著白㲲衣入衆妓中自擊鍾鼓調和琴瑟音樂哀雅即以馬鳴佛鉢一慈心雞傳云馬鳴及佛鉢一慈心雞各當三億金錢言慈心雞者不飲蟲水以水有細蟲故又鄰國聞雞鳴則消滅怨敵而無鬪戰又行禮塔塔為之崩月氏國罽膩吒王後時在路遊行見外道塔七寶莊嚴謂如來塔前禮稽首説偈贊嘆云具足一切智斷除諸欲障等二行半偈其塔即時頽毀洎發塔下果得尼乾尸衆人嘆之奇哉大王有剃髮師傳中髮作鬚乃為王剃鬚人也王於一時命剃鬚已時剃鬚師在王前立而作是言我子端正願大王以女妻之王大瞋汝是賤人種性卑劣云何我以女妻汝子乎即便驅出後更召來言還如前如是再三王思惟曰今此地下必有伏藏故令斯人敢為此語即便掘之獲種種寶王之智慧其事如是神為肉身化作三衣乞乞本作乞與棄同為嫂送食傳云衆中有一比丘其嫂至寺持食餉之淫火熾盛便共交通犯重禁己尋自悔責處處遊行高聲唱言我是罪人不應復著佛法染衣為惡既重必入地獄當於何處而為救護即以銅鉒鉒竹句反送死人之器也金字大品用金寫也傳又云金字法華縣調調去聲犀節節應作角二十五人別傳吳侍官張達等二十五人配於五帝五天大帝也東方青帝靈威仰配泰山南方赤帝赤帝赤熛怒配衡山西方白帝白昭短配華山北方黑帝汁光紀配恆山中宊黃帝含樞細配嵩山八觸未到定後定心不散而發於八觸謂動癢輕重冷暖澀滑次澄次洋澄洋皆天子名九師相承百録章安所記大師之前相繼為祖而來踏心謂推踏也不受之義五處止心頂上髮際鼻柱氣海地輪青目天竺梵志名確立應作確苦角切堅固也二師之義堅不可壞子晉王族本居洛邑七月七日緣氏嶺吹笙升仙今國清有笙冠者後人妄呼繆矣左右公謂子晉未薨時令左右公改之公者或太子三公耳坂如字山之坂也書云下坂之走丸若在大衆色則不定金剛三昧斷惑之智喻如金剛經中此二句并疏並不解釋今私謂之只一王三昧破二十五有故不定也如云青色三昧白色三昧黃色三昧等隨前色變圓覺經云如摩尼珠應於五色隨方各現謂外以五色映珠而珠亦作青黃赤黑等色經一行隨於衆行一行者金剛三昧也衆行者經云能破一切煩惱又能隨一念中變身如佛又能斷恆沙衆生煩惱又能一音説法令衆生各解論以一理頗梨喻中理也衆理謂無常理常理等釋曰理行如珠至現色等此之四句只釋大經置日之喻也金剛喻理三昧是行故曰理行非以理釋金剛以行釋頗梨也搜要云不引大論三十八并五十九兩處文只引大經文下釋云理行如珠等珠者金剛珠耳論更前更後互論深淺並須約六妙門説之更前者前漸則淺更後者後頓則深或修六妙門待發事禪息諸煩惱若事禪不發當用妙門觀諸實相又若實相不顯更修事禪其餘無漏慈悲準説可見論或照止為觀止多心昏經云無慧方便縛應當照止照止曰觀或息觀為止觀多心散經曰無方便慧縛論或於此根入正受或於彼根起出説經云於眼根中入正受於色塵中從定起示現色性不思議一切天人莫能測於色塵中入正定於眼起定心不亂説眼無生無有起性空寂滅無所作乃至意根入正定法塵從定起云云記中示其義趣謂正受空功德説假功德對德及用以三德并本用當用自在用對正定出説雙出入論或於此方入正定或於彼方起出説經云或於東方入正定而於西方從定起記云方謂十方物謂隨塵各有種類經云童子身中入正定壯年身中從定出壯年身中入正定老年身中從定出乃至比丘比丘尼聲聞緣覺天龍夜叉鬼神等身中互論出入亦如是又無情中論出入者如云摩尼樹上入正定佛光明中從定出佛光明中入正定於河海中從定出於河海中入正定於火大中從定出至風地中出入亦如是閻浮為東于逮為西若據此文則日月自南自東自北自西而轉今人所謂古繞也䀕此乃怒目貌應作朕目之瞳子也海上金剛緊那香經云大海水上金剛色緊那羅中妙香色諸龍如華修如山經云諸龍住處蓮華阿修羅中山石色忉金四王色最妙忉利作金𦦨色四天王作衆寶色萬二千天地之中央瑞應經云迦維衛者三千日月萬二千天地之中央今詳萬則大千更中千又小千乃是萬二千佛出中國檀梨名行尸禪名學羼般名道八十卷不見此對至八十二中云般若波羅蜜有所至處五波羅蜜皆隨到薩婆若中住六波羅蜜不失正道何者是菩薩道一切智是也又云菩薩欲得阿耨菩提應學應行六波羅蜜云云從八十至八十三只説六度互嚴耳後人更為撿之初啓曰句下古侯反曲也如乙字形一世間禪根本四禪二世間亦出世間十六特勝通明禪三出世間九想九背捨大不淨等非世間非出世間出世上上禪即九種大禪出世又二一對治無漏二緣理無漏彼文云今明無漏有二種一者對治無漏二者緣理無漏故大集經云有二種行一者慧行二者行行行行者即是九想背捨等對治無漏也緣事起行對治破諸煩惱故名行行無漏行也二慧行者即是四諦十二因緣真空正觀緣理斷惑故名慧行無漏行也六妙門十章今引文注之但欲知之不須講説下去亦爾一歷諸禪一者因數息故出生四禪四無量四無色定若於非非想定覺知非是涅槃是人必得三乘二以隨為門出生十六特勝等三以止為門發五輪禪謂地輪水輪虗空輪金沙輪金剛輪五輪並三昧也四以觀為門生九想八念觀練熏修等五以還為門出生三十七道品等六以淨為門出生九種大禪得菩提果二相生六門各二謂修證也修數者調和徐數從一至十證數者任運從一至十不加功力修隨數者隨息出入無分散意證隨者心既微細恬然凝靜修止者不念數隨名修止證止者身心泯然定法持心任運不動修觀者觀於微細出入息相如空中風心眼開明見三十六物及諸戶蟲證觀者四念處成破四顛倒修還者若隨境即不還本源應當反觀觀心者為從觀心生為從非觀心生證還者心眼開明任運還源修淨者知色淨故不起妄念分別證淨者得空無相願三昧無漏慧發三界垢盡名淨言相生彼文六門次第捨粗從細故也三隨便宜若心便數當以數法安心乃至淨亦如是隨便而用不揀次第四對治所治者三障也治報障者有三一者分別覺觀心如猿猴當用數門對治二者若心乍昏乍散并無記者當用隨門調心隨息治之三者若覺息急當用止門寬身放息治之復次治煩惱障有三一者若貪欲障起當用觀門中九想等治之二者若瞋恚障起當用觀心門中慈悲治之三者若邪見障起當用還門十二因緣還源治之復次治業障者有三一者忽然昏暗迷失境界當用淨門念佛三十二相清淨光明治之二者忽然惡念思惟無惡不造當用淨門念報身佛治之三者若種種惡境界現當念淨門法身本淨治之五相攝修六門時於一數息中任運自攝隨止等五何者調息之時即體數門心依隨息而數即攝隨門制心在數即攝止門知息數法了了分別即是觀門若於五欲心不受著心還數息即攝還門知息無五蓋等垢即攝淨門餘隨止等相攝亦爾六通別初調心數息從一至十依隨不亂而成就數法是則數中成就隨門又當數息時制心數中令覺觀不生是則於數成就止門又數息時知身心陰入界等空無自性不得人法是為成就息念觀門又數息時了知觀照之心無有自性離知見覺想是為數息成就觀門又當數息時無能觀所觀以本淨法性不可分別是為數息中成就淨門以此五門莊嚴數息餘隨止等亦如是又凡夫外道二乘菩薩通修數息一法而解慧不同所證亦別外道鈍根計息入禪受諸快樂利根計息有四句起見聲聞於息而觀四諦知息於身身息是苦貪身息是集乃至滅道緣覺知身息是有支有緣取乃至老死菩薩憫念衆生故修數息息知如幻化非生死非涅槃入平等大慧得無生忍乃至隨止等亦如是一一妙門凡聖大小雖修而通觀法則別七旋轉上來六門是凡夫二乘共故今旋轉六門唯獨菩薩所行以前是從假入空今是從空入假所謂菩薩當數息時憐愍衆生知息不生不滅其性本空雖無息性可得而從一至十知息中四諦十二因緣六波羅蜜等是於息中成就諸地行願餘隨止等亦如是八觀心行者知世間出世間一切諸法悉從心出離心之外更無一法當觀心時知一切數量之法悉隨心王若無心王則無心數心王動故心數亦動作是觀時即知心是隨門心性常寂則諸法亦寂即止門心如虗空有大智慧即觀門不得能觀所觀之智而還通達一切法普現色身即還門成就一切法而不染惑倒不起即是淨門九圓頓觀一心見一切心及一切法觀一法見一切法及一切心觀菩提涅槃見一煩惱生死觀煩惱生死見一切菩提涅槃觀一佛見一切衆生及諸佛觀一切衆生見一切佛及一切衆生又非但於一心中分別一切諸佛法界凡聖色心諸法數量亦於一微塵中通達十方世界諸佛九聖色心數量法門是名數門餘隨止等亦復如是十證相前九種六妙門皆修因之相義兼果證今證者有四一次第證二互證三者旋轉證四者圓證次第證者如上歷別對諸禪及次第相生中説互證者如隨便宜第四對治第五相攝第六通觀四種中説旋轉證者行者於數息中巧慧旋轉或證深禪或證淺定即得陀羅尼等圓證者妙慧開發明照法界如法華中六根清淨者即相似證也真實證者如華嚴中初發心中智慧修發不同一十六句一修發二修不發三修亦發亦不發四修非發非不發又一不修發二不修不發三不修亦發亦不發四不修非發非不發又雙亦雙非四句準此附贅莊子曰彼以生為附贅縣疣經中單作縣音懸注云疣之自縣贅之自附決肒殨癰又曰死為決疣澮癰今記中肒殨非莊子中字也注云若疣之自決癰之自澮決古穴反澮散也定三為損謂三差別如澮癰患定有為增謂三為定有如附贅為增患七善初中後善等或時毀善以助不善大論六十五以無著心説有九種五者顯現或時顯現或時毀善等示處中許示三文序中雖有三文今是大師之義恐不指前三更詳之章安通以慈等對之貧女至加復病苦譬理慈飢渴所逼遊行乞丐者譬名字慈止他客舍觀行慈女雖生子未顯可譬懷胎寄生一子相似慈父母俱沒者慈與觀解俱從相似轉入分真故名俱沒生於梵天是分真究竟兩慈雖聞四名終不能識常樂我淨疏云如生盲人徒聞四譬不識真乳外道亦爾暗信圍陀寧知常樂故云而問他言止觀輔行傳弘決卷第二一達名道路長遠二字是彼注文歧旁歧道旁出劇旁今南陽冠軍樂鄉數道交錯俗呼為五劇鄉衢交道四出康史記謂之康莊之衢莊左傳云得慶氏之木百車於莊劇驂三道交復有一歧出者今北海劇縣有此道崇期四道交出逵四道交出復有旁通鴟充之反鳶之類失義而後禮老子之文只止於禮後禮之下云夫禮者忠信之薄而亂之首今文失禮而後智與信者記主加之而釋五常耳非老子語信不可忘等者非老子意老本純滅仁義與禮信而尊道也今云不可忘者以道為本五常為末本雖喪而末不可忘故云存五德弭從上綿里反止也弭恐應作靡靡披靡也順貌也前雖內外但譬內心依境發心內是也十種發心外非也後云內外心境相對九非一脫屬二邊外境也中道之心為外境所動故云外相對論騷擾騷應搔乃搔動也以手取曰搔有為無漏有字應作無乃無為無漏親生為因生應作正謂正助四三昧別念佛通義例中引他人云四三昧是別念佛是通荊溪云此師自誤今言通修者以四三昧攝一切行故曰通反以為別念佛通收一切諸行不遍乃是通中之一故名為別多生異端雖用一止觀結而通三止觀通別文殊義乃一耳他人云謂一止觀出於三外繆謂頓頓止觀不具不雜亦復如是具對不具謂具是頓不具是漸雜是不定不雜是餘二並是相對來耳論四悉成五緣世界成發心為人成四三昧對治成裂剛獲果第一義成旨歸四五相對自微之著為漸五因緣成四悉反此可知或四悉成一因緣或談四悉成發心一事或談一發心只得一悉益亦須云談一悉成一因緣談一因緣成四悉或多或少緣悉相成乃不定義何得即以修行釋之以四悉會同三種止觀且是消通文相人不見之謂是修行之相善不善愛經云愛有二種一者善愛二者不善愛不善愛者凡夫之求善法愛諸菩薩之求善法愛者復有二種求二乘者名不善求大乘者名為善求及以九喻謂責主有餘經無主字經云深觀此愛凡有九種一如責有餘二如羅剎女婦三如妙華莖有毒蛇四如惡食性所不便而強食之五如淫女六如摩樓伽子七如瘡中息肉八如暴風九如彗星云何名為責有餘如窮人負他錢財雖償欲畢猶繫在獄而不得脫聲聞緣覺亦復如是以有愛習之餘氣羅剎女婦者如人得羅剎女納以為婦是羅剎女隨所生子生已便食後食其夫愛羅剎女亦復如是初食善根子後食衆生令墮三塗疏云初為二乘作譬二乘斷習如還財未盡下八為凡夫作譬責音債見滅煩惱斷故乃至淨經云菩薩求大涅槃見滅見滅諦所謂斷一切煩惱若煩惱斷則名為常滅煩惱火則名寂滅煩惱滅故則得受樂諸佛菩薩求因緣故故名為淨論佛藏十喻一萎華佛身二巖蜂淳蜜三粳𥢶中米四糞穢真金五貧女寶藏六菴羅內實七弊衣金像八貧女貴胎九焦模內像荊溪云文雖有十義但似九以初二文同一義故音場場應作場居色究竟等盧舍那佛初寂滅道場中坐金剛華光王座乃至第十居摩醯首羅宮即色究竟天也凡歷十住處利用出入謂之神易曰備物致用立成器以為天下利定吉凶於始以前民用出入者陰陽往來不窮謂之也化事化身為伴默不俱答一時能説法不比毗曇也搜要云何一時能説法耶答不同小乘故能一時語默阿含無諍經如水如火如巾水將惡用火將沃死巾用拭不淨皆無嫌更撿經略述綱要今取淨名疏注釋彼文約土一質一見羅漢辟支佛三種意生身界內結盡同生無餘所見無異今文約諦佛謂推理中四諦之質見相中釋迦之身四果支佛見諦是無佛是生身更無有異異質一見彼云如娑婆極樂垢淨質異菩薩用天眼見但一有餘今文如四諦四諦既異四教主殊圓人以佛眼觀之四佛盡是法身四諦皆名法界異質異見彼云如娑婆極樂此土見穢彼土見淨今文推理中四四諦異見相中勝劣形殊四教根機見諦見佛各各有異一質異見彼云如身子螺髻於一有餘見淨穢異今文只一四諦衆生隨類各得解普賢道場或勸發品或行法經或華嚴中上二下三淨土徒衆之二法滅起過等三若華嚴頓中淨土則重重莊嚴徒衆則別圓無數菩薩見十方法滅前後異時受苦起過亦復無量此乳味中五多也若阿含漸初穢土則山川堆阜徒衆則三藏小乘法是無常終歸灰滅受苦則三界陰果起過則愛見集因此酪味中五少也餘三味多少準此一質異見比説可知法只是一四見不同謂常無常等儴佉上人章反下去牙反翻為具六群難陀跋難陀二人善星算陰陽説法迦留陀夷闡陀二人深遊財善解毗尼馬師滿宿二人善間音樂戲笑六常為群故名六群繢胡對反畫也論一念心起為迷解本心妄識也記引楞伽如來藏為本者以如來藏在妄識中若大論池水亦喻妄也彼云譬如清淨池水狂象入中令其混濁若珠入水即清淨不得言水無象無珠心亦如是煩惱入故能令心濁善法入心令心清淨經以如來藏為善不善因論云清水濁水其意大同此約教證搜要云存教故地存證故住身亦非是心心亦非是身新經云心不住於身身亦下住心與前喻同文云心中無彩畫彩畫中無心然不離於心有彩畫可得彼心恆不住無量難思議示現一切色各各不相知與前二乘藏通等共或云別前藏通者以前二不修別故今云共者十住修體柝八門十行中又學前兩由曲由應作猶綺語中重常途綺語者大論四十九云為自心他心解愁事説王法賊事大海山林藥草寶物諸方國土如是等事無益於道並名綺語今壞人誦經坐禪等故制心境理教心謂能犯之心境謂所犯之境理謂體性是惡教謂如來禁戒殺盜淫妄十惡中之最重大小俱制大乘俱重菩薩戒中自瞋自説罪過自讚毀他如是等惡亦以教人相涉入者口中四惡但除綺語餘三過者惡口兼妄與兩舌又兩舌兼惡口與妄妄亦兼二此等並是犯於夷愆故重小乘則輕毀訾語兩舌語異語惱僧嫌罵知事者俱犯單提故輕餘意地二貪癡心境理三莫不皆重唯教名輕於貪癡二境起貪癡二心理性是惡不待佛制方名惡也菩薩十重不制貪癡小乘亦爾雖貪癡二惡於心境理犯者罪重以佛不制故教名輕伊蘭旃檀觀佛三昧海經云譬如伊蘭與旃檀生末利山中而伊蘭生旃檀叢中伊蘭臭如胮尸熏四十由旬聖者聲也以其聞聲知情樂者所以鼓詩有移風易俗之義詩序云詩者志之所之也在心為志發言為詩情動於中而形於言也治世之音安以樂其政和亂世之音怨以思其政乖亡國之音哀以思其民困故曰聞聲知情以天子正天下者在聲周易意繫辭曰一陰一陽之謂道繼者善也成之者性也仁者見之謂之仁知者見之謂之智百姓日用而不知故君子之道鮮矣注云君子體以為用也仁知則滯於所見百姓日用而不知體斯道者不亦鮮矣故常無欲以觀其妙始可語至而言極也不合不散諸法從因緣生故合從因緣滅故散若深觀諸法不生不滅是不合不散之義也大論八十二問云菩薩云何應習六波羅蜜法答若色等諸法不合不散色等諸法顛倒煩惱和合故合以正智慧觀故散菩薩以智深觀則無法非合顛倒煩惱皆虗誑故非散本業瓔珞經六性經云六性者是一切菩薩功德莊嚴菩薩二種法身菩薩著百萬億阿僧祇功德為瓔珞所謂習種性性種性道種性聖種性等覺性妙覺性復名六堅亦名堅性亦名堅法亦名堅修亦名堅德亦名堅頂亦名堅覺復名六忍謂信法修正無垢一切智復名六慧謂聞思修無相照寂寂照記云六定復名六觀謂住行向地無相一切種智經以住行向地等妙對釋五種六義妙音加佛日本元記中無妙音二字經中妙音觀音兩品皆有佛但妙音加菩薩耳非謂加佛大論十四父母愛重即以身飴金翅鳥下二云釋迦文佛以福力故死生忉利又思惟言在天無益願生娑伽陀龍宮為龍太子父母愛重欲自取死就金翅鳥於是鳥取龍子於樹吞之父母號哭龍子既死生閻浮提為國王太子名曰能施生而能言問諸左右今此國中有何等物盡皆持來以為布施及至年長至父王所索物布施父與其分又復施盡我聞有如意寶珠隨心所求即白父母從入大海求龍王頭上如意寶珠父母言我唯有汝一兒耳不須去也我今藏中猶亦有物當以給汝兒言藏物有限我意無量於是父母許之令去然後問衆人言誰知水道有一盲人名陀舍曾七反入大海中曾知海道菩薩即命共行答言我兩目失明然後同往俱至大海等三修有三種邪三修劣三修勝三修劣三者觀心無常觀受是苦觀法無我論怫音佛止觀輔行傳弘決卷第三一殺生加行佛不可殺但出佛身血成加行耳如優婆塞經業品以後後業重於前前經云殺父則輕殺母則重殺阿羅漢重於殺母出佛身血重殺阿羅漢破僧復重出佛身血又心境相對四句分別經云一物重意輕如無惡心殺父母二物輕意重如惡心殺衆生三物重意重如惡心殺父母四物輕意輕如輕心殺畜生及方便等三時不同經云一方便二犯根本三犯已如犯淫者舉心及摩畜等方便也兩根相到犯根本也事訖犯已也佛亦曾從文殊聞説般若經中文殊歷陰入界説空法時佛亦聞故論十住婆沙偈云是三昧住處少中多乃至云初禪二三四中間發是勢力能生三昧名住處初禪二禮中三四多論是龍樹菩薩造言十住者解十地也謂於十地中住故名十住故歸敬偈云敬禮一切佛無上之大道及諸菩薩衆堅心住十地是也偈云是三昧住處等者論中釋云是三昧所住處少相中相多相如是等應分別如是事應當解釋住處者是三昧或於初禪可得或於二禪三禪四禪可得或初禪中間得勢力能生是三昧或少者人勢力少又少時住故名為少又見少佛世間故名為少中多亦如是説是三昧經云或時説有覺有觀三地相應或説喜樂等五受根相應或説諸支相應或説界繫相應或説非界繫相應又云或説有覺有觀或説無覺有觀或説無覺無觀或喜相應或樂相應或不苦不樂相應或有入出息或無入出息或定是善性或有漏或無漏或欲界繫或色界繫或無色界繫或非欲界或非色界或非無色界繫是三昧是心數法心相應隨心行法共心生法非色非現能緣非業業相應隨業行非先世業果報除因報可修可知可證亦以身證亦以慧證或可斷或不可斷有漏應斷無漏不可斷知見亦如是不與七覺合如是一切諸分別三昧義皆應此中説不受別請律開多緣梵網唯制別衆食律開七緣一病時下至腳跟勢不能行二作衣時者自恣竟無迦絺那衣一月有則五月三施衣時如皆請戒又道行時船行時等若制止邊並防意地不應為也止則成持若制作邊單制意地者謂修定慧定慧應修作則成持餘心念法獨住比丘無人對首但心念也有衆法心念有對首心念作心念時須具威儀至三寶前合掌誦羯磨偈偈除大德一心念之語須使自耳聞之故今云宣吐如悔輕吉亦具威儀但責心悔不誦悔文綆音梗井桶繩論隨喜勝上四番隨喜三世佛并菩薩四番又勝果報四番萼正應作噩六夢今六中闕喜父母不許當服何藥經中不解服藥不敢臆注帑女餘反此幡乃巾耳屩音腳草履也此文通俗禮記云七日散齋謂祭祖宗時也二十四戒具如備撿第二引文應受六重優婆塞法也不殺者乃至蟻子不盜者乃至一錢不妄者不云我得不淨觀乃至阿那含不淫者不邪淫也不説人過者不説四衆罪第六不得酤酒等也僧鬘此云對面施論鞋屩上音鞋應作屩大論師子吼論二十五云如師子王清淨種中生深山大谷中住方頰大骨身肉肥滿頭大眼長乃至牙利白淨鳥見者高翔遠逝佛師子亦如是從六波羅蜜四聖種大姓中生寂滅大山深濬禪定谷中住得一切智頭集諸根頰云云四無畏牙破壞外道長壽天久受天樂則知無常生厭離心乃入涅槃鹽醋之屬文句釋信解品米麵鹽醋云生空粗如米法空細如麵此即正道四諦下十六諦觀無常如鹽苦如醋此即助道如米麵難食須鹽醋和之十二因緣有十種曾撿經與今文全同但無不二兩字足數上即六反如受戒法中國十人邊方五人若十五中有一犯夷者則十五之數不足然足數者非唯犯夷亂語人憒閙人入定人啞人聾人及未作白前睡人等並不足數小無懺重之説大乘經則有小乘律則無云無耳南山鈔懺六聚法彼文云初則理懺二則事懺此之二懺通道含俗若論律懺唯局道衆理懺者觀彼罪性由妄覆心便結妄業還須識妄本性無生念念分心業隨迷遣事懺者嚴淨道場稱歎虔仰或因禮拜或假持誦又云理懺者恆觀無性以無性故妄我無託事非我生罪福無主又云諸法性空此理照心名為小乘又事懺者四分云若比丘犯波羅夷都無覆藏心令如法懺悔謂羯磨等云云近世弘律師形文斥荊溪小無懺重者準鈔文云有也然大師玄文亦云小乘戒藏不許懺重修多羅藏使犯重人念佛身佛身者念空也此與南山觀罪性空是同也鈔文理懺顯是經部耳安用大乘懺夷以足小乘僧數此記後文引虗空藏經得摩尼珠印印臂作罪滅字若得此相還入僧中如法説戒南山行儀亦用此文若準此意足數可矣云云今詳此文云不足數者是作法懺也後云足數者是取相懺也寶性論緣生相壞論云二乘雖有無常等四對治於如來法身復是顛倒即是無明住無漏界中有四種障言緣者無明住地與行作緣相者無明與行為因生者無明住地共無漏業生三種意生身壞者三種意生身名不可思議變易生死緣即無明支相即行支生即名色支愛取有三支如前壞即死支但推四句彼云為因心故心為不因心故心為亦因心亦不因心故心為非因心非不因心故心波利質多樹法門文在釋籤第八施己安處安者四事足也以己四事施與令安又從而安慰之有纍之形纍者嬰縛之義也文選云穢物故多相纍雖今號比立以寒暑身口房舍眷屬未有不為嬰縛者受施為淨如比丘受檀越請者作淨音漢書以臣詣君曰請亦淨音也故有朝請大夫也七言偈偈云我勑提頌賴吒王慈心擁護受持經等準止例知觀音之名以釋伏疑也三業為應若只曰觀機邊似口業故云約悉檀立名左手把楊枝左表實右表權本是右把楊枝左持淨瓶於權實與定慧義甚符合今左楊右瓶或恐寫誤或別有意五陰四念束五陰四念處想行屬法加之以天方伏於人自伏憍慢能識理性者方能伏人君子之德風偃草也根本既無坐次安在以犯夷人居大僧下是無坐次一支一境雖復已壞七支之中隨犯其一如身之一支犯淫之一境不妨餘支及殺盜餘境不曾犯者猶名清淨豈以餘支餘境未犯者而一例居大僧之下今言已未約緣內外已起約外未起約內水龜走兔下水字應作陸字飛兔下陸字應作水字論若無財物有財物者於財論檀若無財物於六作中能捨諸妄名檀毀戒如篇聚持犯中五篇六聚犯者報別具如第一犯夷報者如他化自在天壽十六千歲墮在泥犁中於人間歲數計九百二十一億六十千歲乃至第五犯吉如四天王壽五百歲墮泥犁中於人間歲數計九百千歲若齊聖斷者我與我所六十二見初果斷畢以禮亡財如婚嫁之禮但問名納綵而已不論財也書云取妻而論財者商侶之事耳父母夫主佛法所護在室為父母護出嫁為夫主護受戒者為佛法護動中規矩規矩者禮也中字去聲呼非禮而動者小人也非謂施者及財物等般若經頌云能於所施物施者及受人等無分別心是則施圓滿今文非彼所施物能施人所受者之三也乃是根塵及受者之三耳論若住色聲香味觸法布施是名住相若計有施物施者受人是名為住所得果報止在人天若達三事皆空名無住相乃是不住能施不住所施不住施物故空財物是色音樂是聲乃是衣物是觸皆達能施心所施塵所受人皆不可得名無住相布施離事即五見文在二十三經云遠離五事所謂五見一身見二邊見三邪見四戒取五見取因見生六十二見計八萬劫以劫為有神之始如去等者涅槃疏釋云如去等者乃計如來即色涅槃畢竟永滅此是如去若身不滅是不如去亦如去亦不如去等大經中有四善事墮三惡道一為勝他故讀誦經典二為利養故受持禁戒三為他屬故而行布施四為非想故繫念思惟乃至四運六十四句文在第五記初不出十法界者具足應如前文明十法界所以不再出者事戒既斥故不再出謂心想見此屬見惑涅槃疏云見倒在凡夫心想倒是學人無學則無倒彼文如何今銷之若心想二倒在學人乃思惑中倒耳非見倒也例如貪瞋癡是思惑與見惑貪等有異只應更云六作舊論文云六受亦如是今添六作乃成記中空指如五百比丘或説無明是身因或説愛無明是身因乃至或説飲食是身因執急則斷乃至一槩用之斥比人用之也今未知記王消何處文耶若涅槃并疏並不見執急之説恐大論七十九有執管文管涅槃疏音姧正應作姦智被真製製尺制反牽曳之義也真字恐誤應作愚擭一號反手取也有見佛者即為説滅增一阿含云佛出世時不度者令度不解脫者令解脫彼説滅六見之法云何為六言有我見即説滅我見之法無有我者亦與説滅無有我見之法言有我見無有我見亦與説滅有我見無我見之法復自觀察説觀察之法自説無我之法亦非我説亦非我不説之法若如來出世説此滅六見之法賢聖已來不曾殺婦人無他諸比丘問佛云云乃至兼談婦人諂誑之情又云又我奔走能象馬車乘此沙門行不暴疾而我奔走不能及之此必是如來是時掘便説偈言尊今為我故而説微妙偈惡者令識真皆由尊威神即時捨利劒投於深中央掘入城乞食婦人臨産甚難見斯事已即往佛所白佛世尊言我於向者入城乞食見一婦人身體重妊我作是念衆生受苦何至於斯世尊告言汝今往彼告婦人言我賢聖生已來未曾殺生持此至城之言使此婦人胎得無他央掘央掘依教向母人説時母人胎即時解脫記文難曉以此正之
