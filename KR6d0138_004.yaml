body:
  text: 丹丘沙門有嚴注止觀輔行傳弘決卷第十二論矝持矝應作兢詩曰戰戰兢兢事理俱障苦集障道滅道是事滅屬理餘二準知論事之人事側吏切置也或作剚所以從刀者以刃置肉中也或作事者非字正體故云託跋乃會意之字耳儢力莒切心不欲為善之義面牆尚書云譬猶正面牆而立藥病俱轉如慳用尸忍等五名藥轉若慳因尸忍等五而轉者名病轉又尸用檀忍等藥病轉準說之是轉非對慳不轉而續起破戒等五蔽破戒不轉而續起慳等名是轉非對若超雜等如慳起已復起愚癡名超或起二三前後不定名雜若至五度名轉名具不得具名者乃至具則兼俱搜要云若轉至四名轉名兼若轉至五名轉名具不得具名者由法轉故若具六方乃名具若轉至五不名具者轉則單轉具則同時度別四句六度各四謂對兼具第一義一病中轉用藏教五如治慳用尸等五并通別圓各六成二十三俱轉名對藥病俱轉名對治四教合論有一百三十八及亦名轉但藥轉亦一百三十八或七或八通人從空出假或七有願智則或八也藏人以祇為道種智或七能起神通願用或八也更詳語業命三實體但二此三為二者正語屬口正業屬身正命離五邪通屬身口故但二耳未暇撿文且作此注及正方便已生惡方便斷除未生惡方便遮止未生善方便修習已生善方便增長度品六句料簡六度道品有事理相破相修相即殺身成人人應作仁論語云君子殺身以成仁無求生以害仁垛徒果切通體別體檀等五度非精進不滿此通也若別者則以誦經為體前文云且寄誦經䇿勤其心晝夜不虧乃得滑利論乍懸至或冷母飢則子在倒懸母飽則子在石壓母飲湯則子熱鑊母啜水則子在寒水一一句下皆云未得欲得未獲欲獲未證欲證由此八故皆不成就故名懈怠經云何謂懈怠比丘乞食不得便作是念我今日乞食不得身體疲極不能坐禪經行不肯精勤未得欲得未獲欲獲未證欲證是為懈怠意若精勤欲得等是精進也論黮瘀黮徒感切黑貌華首選擇長者華首經中長者有妻名曰妙色面貌端嚴居士愛著煩惱熾盛佛知居士貪垢情深即化作一婦人端正淨潔居士見之我妻何緣來入此會佛以神力令此婦人糞汗其衣使此居士不堪臭處以手掩鼻難陀問曰何故掩鼻答曰是處臭穢難陀云汝貪其妻如坐糞穢居士即生厭心後得法眼淨於下生苦乃至於下五盛苦下生下老下病下死下愛別離下求不得下怨憎會下五盛陰如是等苦亦應有樂世尊下生者所謂三惡趣中生者所謂人中上生者所謂天上若復有人作如是問若於下樂生於苦根於中樂生無苦樂想於上樂生於樂想當云何答世尊若下苦中生樂想者夫見有人當受千罰初一下時已生樂想若不生者云何說言於下苦中而生樂想乃至三受三苦以瓶喻同同應作因若下劣心唯有於作則無無作論云受戒時若輕浮心體是無記不發無作不相行有十四種前文已箋今文無想者謂無想果二定者無想定滅盡定命相相應作根擇滅非得非得者非擇滅也諺顏氏家訓往往引之顏氏即梁黃門侍郎之推也彼家訓云陳梁之時讀書為官者少諺云上車不落即著作體中何如即祕書也若披在地披恐是死字耳二縛子果呦音幽鹿鳴詩云呦呦鹿鳴食我㵎萃論六百劫以小起之法華論中無文不知大師所引論黃龍湯屎汁四諦因緣有無等相破者無作因緣破生滅四諦無作四諦破生滅因緣相修可解相即者取開權之義體同故即論廣歷一切法如妙玄大與妙文句中方便與善權光明空品中空與非有非無之類是故當教亦有相修相即常途六是偏圓對辨今云當教者如藏人修道品有益是道品破六度修六度有益是六度破道品相破句也若先修道品不入次修六度即便破蔽或修度不入因蔽漸伏而修道品即便有益相修句也度品一法體本相攝相即句也例記說更對六作行中六度四教合論二十四行中道品合論亦二十四乃成度品各四十八行住坐臥語默等一一皆爾故各四十八其殺千人其應作期土作四釋土應作上乃至無著亦須料簡三教無著異名迦旃延子所說前記引大論斥其所說處處失但闕十一既云此六已列在文則但闕五耳今畫為圖使讀文易曉隨何等通指入何教通名慧性若生滅慧指入藏教乃至無作之慧指入圓教大論十三初以一施生三十七品次以一施而為相因文在十一文云布施時生相似八正道信布施果得正見正見不亂得正思惟清淨說故得正語淨身得故得正業不求報故得正命勤心施故得正方便念施不癡得正命心住不散故得正定如是等相似三十七品善心中生復次布施是三十二相因緣所以者何施時其心堅固得足下安立相布施時五事圍繞受者是眷屬業因緣故得足下輪相乃至有求乞者意欲與時柔軟字語必與不虗故得廣長舌相梵音聲相施時不瞋不著等心視故得青眼相眼𥇒如牛玉相相業相業是同如此卷末引注論棘援援者以棘外匝而援衛也謝靈運有南園植援詩云插槿當列墉謂插木以代周墻二十七賢聖學人十八謂信法二行信解見得身證家家一種子四向初二三果五那含無學有九謂退護思住達不動不退慧解脫俱解脫孱鋤山切十中之一意下文云十乘次位一意用附文意附教文帖釋論五重等文使次第不廣不略等或開或合宜盈宜縮玄文云漸頓二法三道四果不合今則合若小不聞大大一向是頓大不用小小一向是漸此乃縮也若以大破小是漸頓並陳若帶小明大是漸頓相資此乃盈也論析玉篇不出或是蕩字耳左傳云王河蕩析更詳之義兼大小如觀無量壽佛經是圓而頻婆娑羅先證阿那含之類時節如金光明屬方等部而在般若前因果如法華經說文殊昔劫為釋尊九代祖今日釋尊為文殊師兩處師資孰前孰後一義多名如中道理華嚴名法界方等名法性乃至涅槃名佛師多義一名如涅槃一名有百句解脫之義如真俗二諦有七二諦之義或離或合離者如實相生二法三道四果無量義也又如圓覺經大陀羅尼中流出一切真如涅槃等合者又云此經唯顯諸佛境界亦攝漸修又粗言及軟語皆歸第一義之類言義相乖如阿含有中道之言大乘有無常之說皆相乖一多違諍說一則違多談多則違一破立不同如華嚴立二而破二又云此經不入二乘之手等方等立四而破二三般若立三而破通別等亶音尾法華遍破立施則遍立一切法權開則遍破一切法實橫竪並沓且如十妙從因至果後起用是竪也又如境妙則有七科諦境智則二十番不同乃至利益妙十番各別是橫也又境境從因至果攝無不遍是並沓也總別離合如總至一念離為四諦三諦二諦一諦無諦須附次第橫竪之義更宜引文作證令人生信將釋般若持鉢之名終不可也未審本宗如何釋耶疏云有二意若佛意表者持鉢示受分段身乞食求可化機若觀行表者持鉢即受法之器乞食求涅槃味洗足忘定慧之用觀心銷經隨經部若隨法華觀心銷經須取開權意若隨般若須取三般若即空假中意占察不須更加發願以其四悔皆是願故經四悔之中皆有願字如云願我及一切衆生速得除滅無量劫來十惡四重等罪願十方一切成正覺者常住在世轉正法輪不入涅槃願我及一切衆生畢竟永捨嫉妬之心三世一切剎土所有修學功德皆悉隨喜願我所修一切功德資益一切諸衆生等同趣佛智至涅槃城若如是等長悔之文亦五悔義足初如是下即懺悔也兩撿十住婆沙除業品第十有五悔文甚詳亦生起前後次第不亂即不見今文所指未知記主指何處文耶徒勞讚者或勞有音盲者唱懺悔文使悔罪人聽之而心中改過或讚字誤恐是懺字耳更詳不見不得一切法空不可見以不可見故無所得發十大願一孝順父母師僧二願得好師三願得勝友同學四願教我大乘經律五願解十發趣六願解十長養七願解十金剛八願解十地九願如法修行十願堅持佛戒無智遠處論中不見文今詳無智遠處是二義耳論云新發意菩薩先教取相隨喜後乃能行無相隨喜譬如鳥子羽翼未成未能遠飛羽翼備則能遠飛也無智有相遠處無相或可以無所得故至於寂滅故云遠處婆沙四悔懺悔者偈云十方無量佛所知無不盡我今悉於前發露諸黑惡三三合九種身口意惡現生後報自作教他見作隨喜從三煩惱起欲色無色界繫助貪助嗔助癡之三今身若先身是罪悉懺悔於三惡道中若應受業報願得今身償不入惡道受勸請者偈云十方一切佛現在成道者我請轉法輪安樂諸衆生十方一切佛若欲捨壽命我今頭面禮勸請令久住隨喜者偈云所有布施福持戒修禪行從身口意生未來今所有習行三乘人具足三乘者一切凡夫福皆隨而歡喜回向者偈云我所有福德一切皆和合為諸衆生故正回向佛道願文在大涅槃偈云願諸衆生等悉發菩提心繫心常思念十方一切佛復願諸衆生永破諸煩惱了了見佛性猶如文殊等正行儀中注解三卷成文永徽二年季夏製今人未見或有指方等懺者是兩處隨喜文義大同故今互引釋論滅後五品而引現在四信文來以初品初信文義同故搜要云雖現未不同二處義等四念處中以此五品擬五停心隨喜是慈停心讀誦是數息停心說法是因緣停心兼行六度是不淨停心正行六度是念佛停心如備檢和會除於事相相應作障搜要云除於事障以四品事理未融至五品中事不妨理故云除事但以戒定二行引大經云菩薩作是思惟出家間曠猶若虗空一切善法因之增長在家逼迫猶如牢獄一切惡法因之而生即求出家學無上道受持禁戒如秉浮囊具五支戒為道之根源故以戒為停也又云菩薩雖信佛法常住之理內解分明猶多覺觀更學定聖行停心也先修數息次不淨觀乃至大小不淨練熏修等故以定為停心論為十信五品法華文句中每一品開為二以對於十帆令帆去聲如帆之使風隱隱轟轟轟呼庚切隱轟並群車聲文選云轟轟隱隱若此時不出出則賊無如之何不字似多捍音汗蝎胡葛切爾雅云蝎蛣木中蠧蟲論屠粉屠割粉飾以喻違順在次位之初在四方次位之初埤蒼上音啤字書云魏張揖撰三卷文曰埤蒼謂埤於蒼頡也覆冠曰綖冠下更合有衣字論釘鑷下女輒切車綦也以物匝其車令固三聚南山諸經要集中引經佛自釋云知三聚名如來注云善聚惡聚無記聚不來相而來不見相而見疏釋云若以來相而來則非善來也圓人知四不可說即不見相而能觀中道無緣大慈化法界衆生同來寂光是為不來相而來問來與見何殊答來是三智見是五眼圓教從初發心住知四不可說得一心三智五眼將果望因心心寂滅自然流入妙覺大海故言不來相而來五眼轉明至果位時圓見法界故云不見相而見一切世間皆為似塵識之所成色心之法論偈云實無有外塵似塵識生故猶如翳眼人見毛二月等論釋云大乘中立義外塵實無若爾云何見有外塵為證此義故言似塵識生由識似塵現故衆生於無塵見塵故以眼病於無物中見毛月為喻也是故三界實無外塵識轉似塵顯三性同無性也以一切法從唯識生似色中塵等故言似塵也三無性等今依論釋云一依他性謂心心所變現衆緣生故如幻等事非有似有誑惑愚夫一切皆名依他性二遍計性謂愚夫於此橫執我法有無一異如空華等性相都無一切皆名遍計性所執依他起故三圓成性上所妄執我法俱空此空所顯識真性名圓成也此三不離心等空故已上正文昔賢有頌曰白曰看繩繩是麻夜裏看繩繩是蛇麻上生繩猶是妄那堪繩上更生蛇有人釋此頌云日裏看繩繩是麻日喻智火麻喻圓成夜裏看繩繩是蛇夜喻愚暗蛇喻遍計麻上生繩猶是妄此依他也那堪繩上更生蛇此遍計也言遍計者謂周遍起計也既妄計我故受輪轉如於繩上妄起蛇怖此喻圓成實性也凡夫執我正喻執繩為蛇是知麻喻圓成繩喻依他蛇喻遍計法苑中釋云起蛇覺時遣於蛇覺繩非蛇故此喻依他起所執覺者謂依他起故是依繩起蛇覺若見繩衆分是麻麻衆分者遣於蛇覺以麻非是繩故此喻圓成遣依他覺也此遣蛇覺與繩覺也皆依他起故以三性旨深故釋之耳分於二色一分別色二無分別色通一切教理行位依教明理依理起行依行入位教則破心微塵理則三千性相行則如來之行攝一切行位則前阿後茶前後相攝皆無出於心幬帳上音儔單帳曰幬戈擊上音亦此乃戈射耳恐誤應作戈謂以戈擊兵則衝突通道之義也論脯柈上甫下槃現音逆止觀輔行傳弘決第十三所起煩惱乃至四弘非發來之煩惱乃至非發來之菩薩三陰所攝煩惱業魔諸見上慢穢汙陰攝病患果報陰攝禪定二乘菩薩善五陰攝蟹類蟹八腳前兩俱首大者曰螯荀子曰蟹六跪而二螯注云跪足也螯者蟹首上如鉞者是也論利鈍之名通於見思十使本是見惑今以十中五利屬見五鈍屬思則八十八使中有五十二思三十六見非迷事思超越三昧從滅定起入散心中少取法界次第釋之一超入三昧二超出三昧言超入者從初禪起超入非有想非無想處言超出者從滅受想起入散心中散心中起入滅受想定滅受想定起還住散心中散心中起入非有想非無想處廣如彼文以三止觀結發心中說前文約十種發心中廣四教論惑智界內外權實等法中判思議不思議後用漸次不定圓頓止觀結句數多少前對治中若以度治蔽此對治也對治非宜如用檀治慳不去則轉用餘五度治之餘五度亦如是則成三十六句此多也今治四分各有轉治粗具等治則妙也今對治中十二外貪以不淨助內貪以背捨助內外貪以八勝處助瞋癡亦各三助第四明覺數息助沉昏覺觀息助半沉半明覺隨息助即指親想以之為淨修不淨觀有二義或於己起貪或於他起貪若於他起貪者修不淨觀治他不去宜於他起親想轉修慈悲觀以治之又轉修不淨未來四句外道本功本見未見未見本劫本見第三有四句者一神及世間有邊二無邊三上下有邊四方無邊四以捷疾智說四藥互轉為十二句如治貪轉用息用慈用智等三餘治瞋轉用不淨等三治之三四成十二句如上隨自意中觀貪欲等彼觀貪欲中歷四運推撿欲心起滅不可得者空也欲中具河沙佛法者假也塵勞之儔是如來種者中也師資之失如云准河有行大乘空人無禁捉蛇此人於善法作觀經久不入放心向惡作觀薄生空解後不達佛法意純將此法一向教他令他造惡放捨禁戒罪積山獄毒氣深入不住觀察名不住不調搜要云夫食果者存核留種果甘核苦碎已俱失背佛方便如失果縱而不觀如失核第一第二句失住調伏是空第一句也住不調伏是假第二句也第三第四句失迷第四非調伏非不調伏之句而行第三句亦調伏不調伏之義空假相帶於義成失論我修無相則非修無相則非下修無相一句驗是斥上句邪空之人從第三第四句生知於雙非不礙雙注便住調伏不調伏是故相違初心若斷貪欲是住調伏調伏是漸既云非圓非漸是住亦調伏亦不調伏宇文雍毀廢佛教由於衛元嵩魔業此乃滅佛法之妖害隨順方便教意住調伏及迷法者迷不住調伏之義廣行非法謂之無礙居是言是應作土瞋他順理我三業不清淨嫌他清淨故瞋瞋他違理他三業不清淨我清淨故瞋善惡業成各為一念光明空品疏引經示相華嚴經云十二因緣在一念心中大集云十二因緣一人一念悉皆具足如眼見色不了名無明生愛惡名行是中心意識色共識行名名色六處生貪名六入色與眼作對名觸領納名受於色纏綿名愛想色相已名取念色心起名有心生名生心滅名死乃至意思法亦如是一日一夜凡織幾許十二因緣輪網以自纏回法界次第釋名義彼云是十二法展轉能感果故名因互相由藉而有謂之緣因緣相續則生死往還無際分位識名色六入胎位也觸受等出胎位即是出入各作根本搜要云須兩根本者若作兩本者應云不斷煩惱不入涅槃不斷煩惱不出涅槃乃至非不斷煩惱非不入涅槃非不斷煩惱非不出涅槃今論但先列斷後方列出柝體無學恐文誤耳準記五意斷入是柝無學不斷入是體無學文殊傳旨問果疾竟經中文殊問曰居士是疾寧可忍不療治有捐不至增乎世尊殷勤致問無量此問界疾也拆小彈偏歎大褒圓折三藏小歎三教大彈三教偏褒於圓教具如箋難引文三觀折伏已如前說前助覽中亦引文已純陀請住與文殊往復已開常宗經中純陀云我今欲令如來久住於世不入涅槃等文殊言汝今不應發如是言欲令如來常住於世當觀諸行性相如是觀行具足三昧欲求正法應如是學純陀問文殊言如來最尊最勝是天中天壽命更促不滿百年等文殊因此廣說如來常住不變易法壽命無量等諸弟子等說毗伽羅論毗伽羅論河西云是天竺字本經中以論喻大乘也記中連書小大難曉今引經中本文開說之經云我為諸弟子說於半字九部經已次為演說毗伽羅論所謂如來常存不變三牛十四象乃至後後十十增較十住一節迦葉白佛言世有病者四大增損互不調適羸瘦乏極是故不能隨意坐起臥著牀蓐如來四大無不和適身力具足亦無羸損世尊如十小牛力不如一大牛力十大牛力不如一青牛力三牛十青牛力不如一凡象力十凡象力不如一野象力十野象力不如一二牙象力十二牙象力不如一四牙象力十四牙象力不如雪山一白象力十雪山白象力不如一香象力十香象力不如一青象力十青象力不如一黃象力十黃象力不如一赤象力十赤象力不如一白象力十白象力不如一山象力十山象力不如一優鉢羅象力十優鉢羅象力不如一拘物頭象力十拘物頭象力不如一分陀利象力十四象十分陀利象力不如人中一力士力十人中力士力不如一鉢建提力十鉢建提力不如一八臂那羅延力十那羅延力不如一十住菩薩一節之力乃至云十住菩薩諸節骨蟠龍交結是故其力最大論徙倚文選中注云徙移也倚立也今文謂或行或立時多懈怠從魚至貫名為尺澤即大拇指後大橫文前名之為魚大橫文後名之為貫貫後三寸名為寸口貫之一字及貫後三寸名為寸口者未見所出尺澤等今示圖尺後寸前名為關陽凡脉一手中各有三部謂上部寸口中部關上下部尺中應云寸後尺前名為關陽左腎為命門右腎為命根黃帝難經曰藏各有一耳腎獨有兩者何也然腎非皆腎也其者為腎右者為命門命門者諸精神之所舍原氣之所繫也故男子以藏精女子以繫胞故知腎有一也如順撿葉難經作如循揄葉又據徐氏撰黃帝脉經云春肝木王其脉弦細而長者其脉平也脉乃綽綽如弦反得微澀而短者肺之乘肝金之刻木為賊邪大逆十死不治夏心火王其脉浮大而散是平脉也反得沉濡而短者是腎乘心水刻火為賊邪大逆十死不治中宮土脾脉王大阿阿而緩者是平脉也反得弦細而長者是肝之乘脾木來刻土為賊邪大逆十死不治秋肺金王其脉微浮而短澀是平脉也其狀浮而輕如微風吹鳥背之毛也反得浮大而洪者是心乘肺火刻金為賊邪大逆十死不治冬腎水王其脉沉濡而滑或牢而實滴滴如屋漏石上者是平脉也反得大而緩者是脾乘腎土之刻水為賊邪十死不治脾脉來時何何如綖曰平何何字誤應作阿阿王叔和脉訣云阿阿緩若春揚柳此是脾家居四季論㿇思習切小痛也擊攊律音指歸云以手於人腋下捵弄令人懼癢而笑師子𮙬𮙬誤應作湩即乳汁也譬如釀酒滓濁為糞釀酒是喻滓濁下八字是法糟喻糞酒喻尿論若發重觸而數出入入息順地而重若出入相違故病其帝太暭音浩此則伏犧氏也句茫上古喉切太暭之子炎帝神農氏祝融乃重黎也佐帝嚳有功光融天下帝嚳命曰祝融祝融明也少暭金天氏黃帝之子蓐收少暭之子顓頊高陽氏玄冥少暭之二子曰修曰熙黃帝軒轅氏后土顓頊之子曰黎為土官也上𭎸五帝五臣並著德立功於堯之前今之有天下者祀以為神論腭五各切應作齶謂土齶應作癥論元作徵不得衝突於一上坐上是掌反俗謂坐一上是也息若粗是衝突也鼻中補鼻中清涼安和是補息有四聲氣喘三伴也非三是主布置骨解解應作節籠籠應作朧謂朧驚擲驚躍之義擲未詳壁𥁞蛇影晉書樂彥輔有親客久不來問其故答曰前在坐蒙賜酒方欲飲且見杯中有蛇意甚惡之既飲而疾輔曰于時河南廳壁上有角弓弓邊漆𥁞作蛇彥輔意杯中蛇即角弓影也復置酒於前處謂客曰酒中復有見不客曰所見如初彥輔告其所以客豁然意解沉痾頓愈藥草藥與樵同治噦於月切氣逆也暴汝蒲木切謂暴露也以犬牙埋於陽地已呪云不瘥當暴露汝匠伯輟釿於郢人釿當作斤介斧也郢人多巧和者必寡宋玉對楚王曰客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽阿薤露國中屬而和者數百人其為陽春白雪國中屬而和者數十人而已引商刻羽雜以流徵國中屬而和者不過數人是以其曲彌高其和彌寡論得汗為度專精其志如患者得汗明病愈琴𢎸𢎸應作弦勿𠾠說𠾠應作𧭤謂譟𧭤也衆障峯起障高如衆峯之起或只是鋒字耳如刀鋒起文選云是非鋒起榜治步行切漢書郭舍人謂漢帝曰臣願令東方朔覆射朔中之臣榜百顏師古注云榜擊也亦遮遮應作邀要君者無上要音邀無上者謂不尊於上也左傳僖二十八年冬晉文公召天子會于溫使諸侯朝之仲尼曰以臣召君不可以訓書曰天王狩干河陽此晉侯之譎也俱舍云能作及俱有前第二卷已引俱舍疏釋畢記主既云習佛法不可全迷請更檢前注十一遍使名為遍因苦下五見及疑無明集下邪見見取無明疑無明即癡也故有十一耳論衣裳藍縷應作襤褸縛切謂緊切間搆間去聲謂𩰖搆使離間漸染漸音尖浸漬之義十法往驗在下文覘丑廉切未捨失來任運恆有律中捨戒者用口傳心棄本受體應具儀對首云我比丘某甲捨三寶戒律和尚闍梨學事一說其體即無失戒者發邪見失帶佩男女二根失法滅失若未捨未失已前戒體常在此乃善無作也言惡無作者如畜殺具等雖未殺畜惡罪常在亦相續常有作俱無作成論云作時具作無作者此是作俱無作並是戒因至第三羯磨竟其業滿足是二戒俱圓故云作俱無作不妨形俱無作仍後生也又多論云如作善惡二業與作方便齊生後時違教破戒及違本要要平聲謂要其盡形禪門禪波羅蜜中遊邏邏去聲巡也掌山澤之官今之虞部郎是也法門佛八萬四千陀羅尼為髮第一義諦為髻種智為頭慈悲為眼無漏為鼻四辨為口四十不共法為齒二智為手如來藏為腹三三昧為腰若本緣理不能治惡詳此二似如義勢未足若加一句云須應報俱觀方義顯也故搜要云法門之言義兼色報不名菩薩皆名魔事總結上文謂若說惡魔化作佛等像壞六度者不名菩薩餘四通者如前通釋如菩提法智魔通二乘及菩薩與界內四名同者即一五六并二三四並合為界內四魔𢟋惕𢟋篇韻不出昔人皆作堆音惕音逖小止觀中作推剔啾暩千結切金薄薄之下薄恐應作傳字如傅粉種種非時漿過午乃非時也佛聽飲漿謂甘蔗漿蒲萄漿等伏翼編蝙貉下各切正應作貈似孤善睡獸也㹟㹬音決使搜要云今江東呼豼為㹟㹬豼音毗猛獸也虎豿之屬雌者曰𧴎搜要云乃步切貙音樞虎之大者䝟貐上烏八切下音羽爾雅云䝟貐類貙虎爪食人迅走止觀輔行傳弘決第十四初地乃至十住魔不能說圓言初地等者乃指別地圓住餘文只云說別地前論狡擲擲恐是猾字耳通教見位同三藏伏見本斷位未詳或寫誤論前四分觀多貪不淨觀乃至慈心觀文殊問經三十六垢經有兩卷上卷只明三十六使是欲界苦下十使集滅各七道下二使加四思惟為三十六使經無垢名恐是此耳垢使義同故得引用九禪中通有事理但約自行化他而分大小理者如云菩薩聞思前行世間出世間善一心安位或止或觀離一切妄想身心止息第一寂滅云云事者如利益衆生禪中菩薩依布施衆生所作以義饒益皆與同事為除衆苦所應說知恩報恩護諸恐怖離諸憂苦等云云九禪並是菩薩不共之禪二乘尚不聞其名今以自行為小化他為大通八地前亦復如是若八地後下根受接入中者此乃無緣慈耳論自行十二門化他讚法讚者十二門禪或自行或勸人修也贊法者贊支林功德法也贊者者贊十二門贊禪者也五輪禪後方始驗於善惡相性又云今明因止證五輪一地輪因止出生初禪功德如地生萬物二水輪於地輪中若證水輪三昧即發諸禪功德三風輪三昧即相似無漏解發即入十信四金沙輪是菩薩即入三賢十聖位中破塵沙煩惱五金剛輪三昧斷一切結使菩薩心中破無明細惑言驗善惡根性者五輪之後文云驗善惡根性有四一善法章門二善根發相三虗實四揀簡及以性等外道世性九雙前文中次第不次第雜不雜乃至更不更等故全不列九雙中全不列作意修發相對合為一十六句前第七記中已箋今止觀文則無事修理發事發十二句但有非事非理修事發四句事修理發事修事發事修雙亦發事修雙非發理修亦四句雙亦修亦四句今止觀中無此十二句也但有非事非理修事發乃至非事非理修非事非理發論𢜏然明淨𢜏字無出只恐是匆字耳𢤱悷上力董切下音厲多惡也有人具久欲久未到久節節邪正如修證中如根本禪中有八觸觸中邪相有十雙一觸體二定亂三空有四明暗五憂喜六苦樂七善惡八愚智九縛脫十強軟正相者一觸相如法二定相三空相四明相五喜相六樂相七善相八智相九解脫十心調十皆如法一禪既爾諸禪亦然欲界淨色在諸根上勝義根在浮塵根上料亂料應作繚熱𦞦黑各切肉羮也鯖音征煮魚肉也亦作𦙫相承釋四欲界四應作云落漠無分齊冥昧義實體唯十初一二三禪同一樂故不應別說一二三同一樂支則不應開為十八與十一一修方便二證中間證相六初禪發相釋云行者於未到地中證十六種成就即初禪發相十六者謂動癢涼暖輕重澀滑又掉猗冷熱浮沉堅軟二支義支離為義如因樹根根莖則有支條三因果體用因果者內外方便及未到地為因感得初禪為果又五支為因第六默然定體為果體用者還以默然心為定體從默然觸至初發起五支為用從體起用用則在後又默然果起五支之法此就默然為體五支為用四明淺深佛弟子修諸禪時有下中上離此三品故有九品若細而論應有無量品五進退證初禪時有四種人根性不同謂退住進達分若退分者若人得初禪時或有因緣或無因緣而便退失住分者不退失進分者或不加功任運自進或勤修乃進達分者有人得初禪時即發無漏達到涅槃六功德得離淫火則獲清涼得離過善心正行二善二禪三禪四禪證相皆有此六義禪門明觸有一十六四大各四地大重沉堅澀水大涼軟滑冷火大暖熱猗癢釋云如熱是火體兼水故有暖兼風故癢兼地故猗餘三各兼類此風大動調輕浮者四大者應作問次以三禪對中十界五陰名應云以三禪對四禪文脫四禪兩字又多中十界五陰名六字為對五欲名為五支若對善法名為五法修證中釋云若對不善法即破五欲五蓋若對善法即對行五法故釋論云離五蓋行五法具五支初禪八觸四大體用各別輕暖冷重是體動癢澀滑是用論經論出之或前或後如成論明五支次第者捨念智受樂一心阿毗曇明次第者慧念樂捨一念大集次第者念捨慧安定瓔珞經中次第者樂護念智一心釋論次第文則不定論云緣少許識若爾即是無所有處亦是不用處禪門中問云有人言修無所有取少識緣之入定此事云何答不然應捨一切但念無所法故名無所有處而言少識者但意根對無所有法塵生於少識非是緣少識也入定名少處也肪普防切脂也三事通修身息心大論如旋師旋師弟子知繩長短旋論中作鏇論云譬如鏇師若鏇師弟子繩長知長繩短知短云云鏇者圓轆轤也轆轤運轉須以繩黃淡癊淡應作痰𦚻先安切脂肪也有八復次皆自結喻除一闡提菩薩品云譬如良醫善解八術所謂吐下塗身灌鼻若熏若服若丸若散而貧窮人不肯服之經中喻意藥除諸病如大涅槃能除無量煩惱犯四重禁五無間罪者悉令發心除一闡提經有八復次即八法喻意大同勝處一切處合在背捨中明之勝處中內有色相外觀色少內無色相外觀色多并一切處青黃赤白地水火風等同合在八背捨中內有色相外觀色并內無色相外觀色中明之阿羅漢退約六羅漢說有退不退一退法最是鈍根才遇少緣便退學位二思法於所得果恐有所失恆思自害三護法於所得果恆自守護既得之又患失之四安住法於所得法能自安住五堪達法謂堪能修練根達不動六不動法最為利根不為煩惱所動更無有退前之五種是鈍根者隨信行性名時解脫要得好衣好食好臥具好房舍好同學好說法人於此六中但隨得一方得解脫若第六不動法人從前隨法行見至性生名不時解脫也又此六種有退不退及果退與性且第一退法者唯有果退無性退第六不動法性果俱不退中間四類有退不退若果退者退歸學位若性退者但退種性不失無學若至學位中本是思種性今至無學從思上練成護住堪達此三容有是一道所成故若思種性即定不退以是二道所成故論云四從種性退五從果非先言非先者非學位中根性也又四句分別一退果不退性第一退法者是也二退性不退果即從思法上練成者但退此練成種性耳三性果俱退謂退法上練成種性四俱不退謂二道所成種性及不動種性已上為約第四果說也若通約四果論者三宗不同有部中說初果不許有退以斷迷理惑定無漏故從三果斷事惑證得事相浮僞故許有退二大衆部說前三果皆許有退以斷惑未盡故唯第四果不退斷惑盡故三經部說初後果不許有退定是無漏道證故中間二果容許有退若無漏道證不許有退若有漏道證即許有退問經部若不許第四果有退者何故教中說有退果等六答但約現法樂住說有退不退謂退此靜慮名退法思此靜慮名護法等故通明退不退等今記中云並依世道用欣厭斷者即彼文云有漏道乃世禪六行觀作初果人所作事非婦不淫墾地不天黮徒感切又他感切黑貌𭱨時介切黵丁感切大汙垢黑也上臘下都恰反拽音曳大小別故下文云就聲聞法謂言如此於菩薩法禪禪轉變何得無耶大經十三迦葉難佛如是思惟無有實利文在第十四因佛說四無量心云初住菩薩修大慈時於一闡提心無差別不見其過故不生瞋以是義故得名大慈善男子為諸衆生除無利益是名大慈欲與衆生無量利樂是名大悲於諸衆生心生歡喜是名大喜無所擁護名為大捨乃至云因世無量得出世無量迦葉白佛言世尊除無利益與利樂者實無所為如是思惟即是虗觀無有實利世尊譬如比丘觀不淨時見所著衣悉是皮想而實非皮所可食噉皆作蟲想而實非蟲等肉瓨瓨恐誤只是瓫字第三背捨中却觀前二二者謂內有色相外觀色少若好若醜又內有色相外觀色多作前四也謂二背捨二勝處次於此後成餘勝處淨背捨後成於餘勝處中內無色相外觀色少等聞說不淨觀法自謂已作所作後往犍馱羅國見於女人經只有十卷第十中云以不淨觀折伏煩惱令不得起其男子謂言已依所作不復精進笈多言善男子汝當精進勿作放逸答我已作所作得阿羅漢已云云今記中巳字應作已謂已作所作者乃增上慢之類依正二報得勝知見如別教四念處中說文云依正俱醜骨人所放八色為好此兩俱不淨者而為好醜此為勝處初禪攝若內無色外觀色若多少若好若醜勝知見二禪攝雖無骨人而外有八色勝知見者了此心於色不為色縛心能轉色故言勝知勝見光勢八色流光未成怨親各三中人一品於親有三者上品親與己法交者中品親與財法交者下品親與財交者怨亦三品上品怨殺我父母者中品怨殺我兄弟者下品怨損我朋友者處中不怨不親自為一品今修此觀普作拔苦與樂之心還有三品謂上中下七度行三種慈合三七二一番如是行時怨親平等上品親為第一中品親為第二下品親為第三處中境為第四下品怨為第五中品怨為第六上品怨為第七環坐一處初起觀時上品親次第行遍可智第二以中品親為頭行上品樂與中品親中下品樂與下品親下品樂與處中境第三以上品樂與下品親中品樂與處中境下品樂與下品怨第四以上品樂與處中境中品樂與下品怨下品樂與中品怨第五以上品樂與下品怨中品樂與中品怨下品樂與上品怨第六上品樂與中品怨中品樂與上品怨前來上品親但得上品樂今轉頭將下品樂與上品親第七以上品樂與上品怨中品樂回頭與上品親下品樂與中品親如是七度行慈與樂不揀怨親每人皆得上中下三品樂此俱舍釋文小乘位中引若禪門中亦明修法謂初修時令上親人得下樂次修令上親得中樂中親得下樂次修令上親得上樂中親得中樂下親得下樂次修令中親得上樂下親得中樂中人得下樂次修令下親得上樂中人得中樂下怨得下樂次修令中人得上樂下怨得中樂次修令下怨得中樂中怨得下樂次修令下怨得上樂中怨得中樂上怨得下樂次修令中怨得上樂上怨得中樂次修令上怨得上樂今記文似難曉引文注之或煩十二時等玄文云無明是過去諸結時行是過去諸行時識是相續心及眷屬時即內宮中內音納若五陰愛生故然經中以然火為喻經云若有無常色乃至無常識因愛故然然者即受二十五有若愛滅則二十五有果報不然破染染品等論中問曰經說貪欲瞋恚愚癡是世間根本貪欲有種種名初名愛次名著次名染次名淫欲次名貪欲有如是等名字此是結使依止衆生衆生名染者貪欲名染法有染法染者故則有貪欲餘二亦如是有瞋則有瞋者有癡則有癡者以此三毒因緣起三業三業因緣起三界是故有一切法答曰經雖說有三毒名字求實不可得何以故若離於染法先自有染者因是染欲者應生於染法若無有染者云何當有染若有苦無染染者亦如是立因緣品及邪見品申於三藏二乘觀法故立六因四緣用救小宗破十二因緣品問曰汝以摩訶演說第一義道我今欲聞說聲聞法入第一義道答曰凡夫為無明所盲故以身口意業為後身起六趣諸行隨所起行者有上中下識入六趣隨行受身以識著因緣成有名色集名色集故有六入有六入因緣故有六觸六觸因緣故有三受三受因緣故生渴愛生渴愛因緣故有四取取四取時以身口意業起罪福令後三有相續從有而有生從生有老死從老死有憂悲苦惱種種衆患但有大苦陰集是故知凡夫無智起此生死諸行根本智者所不起但以如實見故則無明滅無明滅故諸行亦滅以因滅故果亦滅如是修習觀十二因緣生滅智故是二事滅是事滅故乃至老死憂悲大苦陰皆如實正滅正滅者畢竟滅是十二因緣生滅義如阿毗曇修妬路中廣說破邪見品我於過去世為有為無為亦有亦無為非有非無即名常等諸見依過去世我於未來世為作為不作為亦作亦不作為非作非不作是為邊無邊等諸邪見依未來世如是等諸邪見何因緣故名為邪見是事今當說然論中破因緣及破邪見兩品之中且無六因四緣之名況復六因四緣本是小宗之義今詳之以由外道計無因緣及與斷常若佛教談六因四緣是生死之本及破斷常者正抉小宗也學者更詳多少皆爾語一界為少說三教為多並為十界中之一轉行有為六度搜要云應云五度但通說六耳止觀輔行傳弘決第十五論五種涅槃五陰滅第三卷初地即是初住釋偏圓中云別教若破無明登初地時即是圓家初住非復別教初地第四卷以思議釋不思議文云思議境者小乘亦說心生六道因果大乘亦明心生一切法謂十法界也第五卷不思議初明一心任運具於三千文云一念具十法界為作意具為任運具答法性自爾非作所成如一微塵具十方分及下約十禪修觀中行人觀法極至正助文中對治助開畢乃結云行人觀治極至於此若不悟者是大鈍根大障罪恐因罪障更造過失故重下三種意耳魔境後明陰入十乘度曲入別文云通用一意為觀者行人根鈍先解通意度曲入別中論品品別意而俱會無生通別互舉得意相成也墮世四肢落謝故也可不誤哉諸部雖異別圓無異何必曰過又以華嚴為頓頓法華為漸頓亦異計也或見是諸佛境界諸佛境界可見故四明談寂光有相若七生初果或斷欲惑上上或上中上下等斷未盡者值無佛世例名為小不斷惱脫煩字自護止作止作者律鈔云方便正念護本所受防禁身口不造諸惡目之曰止止而無違戒體光潔順本所受稱之曰持惡既已離事須修善必以䇿勤三業修習戒行有善起護名之為作虧點應作玷玉之瑕也衆法作行或當稍緩有衆別兩法若對首者是別法四僧行羯磨事是衆法稍緩者或預十師受戒或行結戒等事雖是善行恐亂禪觀故少緩又止持中雙持雙犯事必須具持犯事細亦難以明今且明身口雙持犯身二持者鈔云離殺盜等過名身止持受食食等名身作持口二持者離口四過名止持知淨語等名作持身口各二犯者反上應知又如淫戒依教防禁即止持也作蛇口等想縱為境逼三時無樂即作持也違作即止犯違止即作犯此一既爾餘戒亦然單持別犯作中無止或當未具謂作持行中不具雙持犯也以由善事善法聖多制作作則成持止則成犯豈有不作而成止持耶所以作中無止但單持犯耳故曰或也既有或字此亦一往之義耳若委辨者作中亦有雙持犯也且如三衣佛令備具不敢違侮名為止持如教䇿修順行不犯名為作持違此二持便成兩犯此一既爾餘可準知又止作中自行從制事必不廢自護止作必無所犯為物從開或可未具為他作行猶未能也事理不二白四單曰衆別兩行平等事不妨理觀若性若譏夷罪名性餘篇名譏住於俗諦名為不卒暴疏云安於俗諦忍衆機緣稱適機宜體忍違從故心不驚論以智慧有無明愛取故如經云若有讚歎便生歡喜若復誹謗便生憎嫉如是相好從此功德生此言相業也涅槃經云菩薩修習三十二相業因緣者若持戒不動施心不移安住實語以是業緣得足下平如奩底相若於父母和尚師長乃至畜生以如法財供養供給以是因緣得足下千輻輪相不殺不盜於父母師長常生歡喜得成三相一手指纖長二足跟長三身方直乃至不隱他德稱揚其善得白毫相等報恩經言相因者即是相業相體前記云別圓真因所證理體而為相體非謂報身不思議海今念佛發禪乃是五品人觀境且見應佛相耳若報身相海是十信人所見相也所得神通不共二乘經云二乘所作神通變化一心作一不得衆多菩薩不爾於一心中則能具足現五趣身又云菩薩化身猶如三千大千世界以此大身入一塵身其心爾時亦不隨小二乘雖能化身令如三千大千世界而不能以如此大身入微塵身等經中廣明修通之相經云先取聲相所謂象聲馬聲車聲人聲貝鼓簫笛歌笑等聲而修習之以修習故能聞無量三千大千世界所有地獄音聲復轉修習得異耳根異於二乘天耳乃至云菩薩能聞無量無邊恆河沙等世界音聲記主云雖非正亦欲略知彼經本斥菩薩住禪維摩經云貪著禪味是菩薩縛以方便生是菩薩解五行文末雖復重釋第一功德如備檢中稍似未齊論引諸禪發無漏以例禪已見發或禪見俱發見已禪發則少文中例已却釋云未到少六九地發多故記云未齊也若云得無漏已發禪例發見已禪發者始可齊耳細歷四見總說只是計一若細歷者或身與神異亦一異非一異乃成四見也相與分等相者謂神與相一神與相異亦一異非一異分者謂分與有分一分與有分異亦一異非一異三四兩句三計一異四計非一異者亦各計四見如何以母顯子富蘭那迦葉本是六師之名付師云迦葉母姓富蘭那母字是以母顯子約於五衆成十二耳更加五衆即是人人即是五衆方成二十不以數緣為第四句三無為中只以虗空無為為第四句必不用數緣也數緣者謂擇滅無為也非擇滅中非數緣者心緣五塵若專緣色塵者則但眼識起耳餘塵餘識不起楞伽宗於大乘文中處處破外破小楞伽正宗決廣辨六七八識而開為多門謂二藏二空五法三自性二無我四智三身三有性三無性等言處處者指此也言破外者如云一切心性悉是無相非壞事名無相也若壞事名無相者不異外道若外道無相者壞事作空如抽葉拔柱廓爾無處乃是外道無相也破小者如云一人無我謂陰入界二法無我謂真如法此二無我者屬二乘行等又引經云如來藏者是法界是法身是自性清淨不同外道所說之我二乘之人迷於自性不覺藏識起於妄想等觜參上音茲角亢亢音剛亢則喉也故古之烈士有扼亢而死者乃扼亢也圓教三者性謂觀十界色文中性念處中三諦有雙非共念處中有雙照緣念處中言身受心法從義便也亦互顯也九念處藏三因大異故三通三因大同故一別地前三登地一圓教一共九念處在此論末保弱老云柔弱生之徒剛強者死之徒論常無欲以觀其妙老子語莊云皇帝問道德莊子在宥篇云皇帝立為天子十九年令行天下聞廣成子在空同之上故往問曰吾聞子達於至道敢問至道之精吾佐五穀以養民官陰陽遂群生廣成子曰所問者物之質欲官者物之殘皇帝又問治身奈何而可長久廣成子曰無視無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精乃可以長生跨企𠆳應作跂老子云跂者不立跨者不進解見備撿第三引疏注守雌老云知雄守雌可以為天下溪兩為雲兩當作雨莊子曰雲為雨乎雨為雲乎為去聲呼注云二者俱不能相為各自爾也孰降施是降莊子天運篇作隆施施式氏切與弛義同意謂凡外物或隆盛或弛廢無人使然皆自爾耳莊子雖防小盜不意大盜揭仁義而謀國記主斥諸侯如田子成殺君之類是也老莊之教使人絶聖棄智歸乎淳朴果用聖智乃大盜也貴難得之貨乃小盜也外篇胠篋曰世俗所謂智者有不為大盜積者乎所謂聖者有不為大盜守者乎何以知其然昔者齊國鄰邑相望四境之內立宗廟社稷治邑屋州閭曷嘗不法聖人哉然而田子成一且殺齊君而盜其國故絶聖棄智大盜乃止謂去其所資則未禁而自止也擲玉毀珠小盜不起謂賤其所寶則不如形而自息也莊子祿之以天下尚不顧又何時祿國耶恐學者誤記主之意故繁此注也負建鼓而求亡子莊子曰仁義先王之蘧廬止可一宿而不可久處又曰孔子見老聃而語仁義老聃曰夫播穅眯目則天地四方易位蚊䗈𠾱膚則通昔不𥧌夫仁義𭟎然乃憤吾心亂莫大焉君子使天下無失其朴又奚傑然若負建鼓而求亡子者乎郭象注云揭仁義以趍道德之卿其猶擊鼓而求逃者無由得也數緣滅處尚自非真數緣者釋擇滅無為也滅八十一品惑數此但能滅故曰非真證位非數由佛冥證不生之理理亦非數故也俱舍云所言滅者一擇滅二非擇滅論云一切種冥滅者是非擇滅也由世尊斷一切種冥證不生之法名非擇滅所言證者是不染汙無知勝緣關位得非擇滅故名為證若擇滅數量如三界九地煩惱八十一品惑證一擇滅是則證八十一品擇滅也並俱舍正文此二尚非擇滅非擇滅之二況復餘一指虗空無為也當知虗空亦破外道執虗空為是亦非矣拌普庚切恐應作烹論名噉人狗法華經云有諸惡鬼首如牛頭或食人肉或復噉狗著見之人撥無因果撥出世因果如食人肉撥世間因果如噉狗肉見心乃飽經云夜叉競來爭取食之食之既飽惡心轉熾既飽者見心成就也惡心熾者見心增廣也嘊喍嘷吠經譬發言論決是非之理如吠經作摣經中鬬淨摣掣譬疑使猶豫二邊名疑未決是非鬬諍意謂為是名掣復謂為非名摣九十六道三順佛法常塗九十六中一是小乘以大斥之義同外道今文云三未詳或三字誤只是一字蟲字應作蟲論中舊誤作蟲故記指云蟲應作蠱今記又寫誤作蟲翰珠論作幹非薏苡子苡音以即車前子亦可治螝胡對切此乃蠶蛹耳應作蛔音回人腹中長蟲也雷者陰陽蕩動莊子云陰與陽錯行則天地大絯於是有雷若以斗稱欺人震死者非無神也䝖獠今字從豸作者玉篇不出䝖應作狐獠應作獠力吊切乃夷狄人也字非矛槊矛兵器長二丈許槊本作矟亦矛類長一丈八尺八不淨物經云比丘不應畜養奴婢牛羊非法之物若有比丘畜養如是等不淨之物應當治之某甲國王如法治之驅令還俗大經通明謂通明佛性也善根人有闡提人無闡提人有善根人無二人俱有有二人俱無以不造新故能所故畢所舊記作使謂惑為能使果為所使今能使畢負河圖河洛出圖文曰靈龜負書丹甲青文在耆叢出蓍式之切草名也其草出蔡州若地上有蓍草必下有靈龜攝龜音輒腹甲能自張間好食蛇十時總明三藏三乘方等通教上諸文中言聲聞與緣覺則通明兩教言菩薩則通示三教至此思議境中明三藏三藏三乘畢方別示通教二乘與菩薩搜要云總別隨便不可一準更於二外別立疣贅他人二頓文云若漸頓者初住已前四住先除若頓頓者初住已前圓伏五住登住已去圓破五住荊溪斥云初住已前四住先除引證屬圓處處皆爾乃至登住圓破即顯住前五住全在又云頓頓如法華六根清淨不云先斷見思之是頓頓漸頓如仁王長別苦輪海即是先除見思又斥云自言相違法華無漏意根仁王長別苦海無漏與別但有因果之殊耳白瑛瑛應作英與下紫英同合觀蠲忿觀應作歡草名服之去人瞋忿故名也生西川益州山谷中葉似皂莢萱草忘憂萱音暄即鹿䓗也服之者除人憂此二句出嵆康養生論與張華博物志其說同重婁婁應作樓故如三車如應作知正證空見正應作引注三大部後總序有巖伊昔承乏三易住持後以董衆無堪遂築庵自處雖然而有志翼扶宗教願結鴻因注法華玄籤曰備撿者四卷注文句記曰箋難者五卷注止觀輔行傳弘決曰助覽者四卷二十來載手披目閲雖心勦形瘵而日得游泳法華性海不敢告勞因茲發願願憑輔道之福神生極樂早證法忍分身十方盡未來際每弘正法開導衆生使諸衆生於己心中開佛知見又從頌曰祖師三大部留贈意何深展卷迷文處焚香大藏尋雖然形小注不是謾勞心願以此功德資歸七寶林後序吾祖智者三部之教其旨深遠其辭浩博苟非識洞天人智該今古未易探其所蘊矣余自游學丹丘每聞摣庵法師年彌高而德彌邵智識明遠得心傳獨到之學常造古人超軼處雖間世名聞之士往往莫能肩其右觀其為人好學不厭樂教不倦仁智兩全而世所希有夙夜匪懈陶成晚進使人人皆歸模範之中設心可謂至矣師猶以為未也其於講訓之外箋三部之文疑者辨之晦者彰之使吾祖之教若青天白日人皆知其清明鳳凰芝草人皆知其為瑞輔翼吾教豈小輔哉故止觀四卷名為助覽余晚還故里師亦圓寂每恐埋沒斯文常形寤寐偶因潘處士首話此集有補於世勉之鏤板流行處士躣然而從乃曰非敢規錐刀之利蓋欲便乎學者抄寫之勞抑亦廣布法師之教矣余加其志故附書於天台白蓮草首座以求藁本章師喜成人之美樂揚人之善每以弘道為心覽余之書即叩依闍梨然依公乃法師之裔非特喜余之書樂與其本亦將答先師之恩也噫法師之教永傳不朽而名振千古自今日始矣余覩斯文喜不自勝輒為之序以繼其後焉時政和四年二月日永嘉橫陽禪林住持傳教沙門眘徽序
