body:
  text: 止觀輔行傳弘決助覽序丹丘沙門有嚴述止觀者一切諸佛之秘印也昔我祖禪師以無所智而得之於法華妙經後於玉泉九旬慈霔其義深遠其文浩博後之學者非夫玄覽洞視目無全文或難以臻其奧今更以記文并援引經律儒墨雜說又難曉寤幸因講次遂撿討他文輙形注釋且助山中晚進學覽之力非謂增臆說如簸糠眯人目也折為四卷命曰助覧讀者無無小補皇宋元符二年歲次己卯序以冠之
