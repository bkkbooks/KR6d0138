body:
  text: 丹丘沙門有嚴注止觀輔行傳弘決卷第四醫令嗽毒嗽音速吮也吮食允反亦須復推向作覆字也若推者如初句中相推云若欲貪滅而貪欲不生者為即為離若即者滅那能生若離者生而無因等故今文中不復委書三四句論中不復具作句法但令列初句對餘境時今論中且從六受一中論貪若對餘五論之又名未起通對十界後若別起今文且從一界將已未對論若餘界未起乃是別論未耳今遮此未故云恐也乃至未貪欲心非生非不生十六句餘三句令例初句今為例作第四句使前二句可作應云為貪欲已心滅未貪欲心非生非不生為貪欲已心不滅未貪欲心非生非生非不生為貪欲已心亦滅亦不滅未貪欲心非生非不生為貪欲已心非滅非不滅未貪欲心非生非不生何得亦具無等三句上問已未只可論不生何得具生故今拒之若如問意只可論不生者正生中只合論生又何得論不生耶事助如方等歷幡壇道具中修觀者是觀柱緣生論云梁柱椽棟名之為殿上中下分和合名之為柱片片和合故有分名衆禮和合故有片名除三分柱因緣名字更無柱名等云云七識正因種彼經云六入為種七識處為種此七識者非第七識之識也此第七識乃了因種耳今云正種者疏引什法師釋云欲界為一三禪三空為六合為七識住所以然者三惡苦多識不樂住第四禪識色微故又無想天識不樂住第四無色以非想法微故識不樂住隨識樂住即是法性故得為種已上止文怫音佛恕也因緣一法治邪癡故十二因緣治斷常癡若轉計者從此句生四句推無記不生若轉計者為無記滅已不生為無記不滅不生為無記亦滅亦不滅不生為無記非滅非不滅不生起空屬空起有屬有搜要云非前二收不出前二或善或惡或空或有也不善四句如無禁貪欲即是道等四句嚳苦沃反五帝中第三帝也史記云黃帝為有熊帝顓頊為高陽帝嚳為高辛帝堯為陶唐帝舜為有虞皆同姓而異國號嫄音原而孕所孕之子謂不祥而棄之遂名曰棄乃周之始祖也齓初覲反毀齒也獫狁獫本作玁音險狁音允皆畜種故字從犬薰鬻薰本作鬻音育夷名也綖音延此乃覆冠衣耳應作線與線同公羊傳云中國不絶如線幾盡上巨依反近也謂近盡荒服荒遠之國也東曰夷南曰蠻西曰戎北曰狄有不火食衣以羽毛都無禮教酣胡甘反嗜酉酒為樂啜與啜同高陽之子顓頊姓高陽氏五馬兄弟五人睿音慧蒞音利祲音浸天邊之妖氣爝音黑衣當王江表僧多著黑衣周武惡之僧屬陰慮陰王以奪陽覘勑艷反窺覷也甄音真姓也九流漢書九流一名家流二縱橫家流三雜家流四農家流五說家流六權家流七墨家流八陰陽家流九道家流若爾者道士本儒流耳巋苦軌反髠苦昆反嬙音牆柤音櫨狙子余反猿屬性多詐齕痕沒反亦嚙也六牛經六年展轉六十牛六牛六年各生子為三十六子并母成四十二也牛子第五者至第五年第六年各生一子是第五各生兩子也第六牛只各生一子牛孫共生十八子是則母兒孫共為六十牛經中以六牛展轉喻比丘從戒生禪從禪生慧而成六神通但結提吉從諫者吉不從諫者提兩夷一提自行淫欲又說過人法云我知是我見是謂我得暖頂乃至四果等是名兩夷以此教人又犯一提論依律擯治律有三擯一不見擯二不懺擯三惡邪不除擯若人犯夷人勸懺悔答云我不見罪佛令作不見擯又若犯者人勸懺悔答云我雖見罪不能懺悔佛令作不懺擯若如利吒言淫欲不障道佛令作惡邪不除擯首生白髮經云如少壯人首生白髮愧而剪除持戒比丘訶責壞法之人亦復如是鄰國相攻經云譬如有王專行暴惡會遇重病有鄰國王興兵滅之是時國王無力勢故方乃怖畏改心修善如是鄰王得福無量持戒比丘亦復如是驅遣訶責壞法之人令行善法得福無量體外之惑疏云體上之惑一聞三諦諸法從緣生是法緣及盡是說苦集滅三諦見舅墮負拘絺羅初難佛云一切法不忍佛答云汝見是忍不因而墮負門粗細中六神六師第一臣名月光所事師名富蘭那但言殺父母者無果報五臣各事一師皆外道輩聞說陰幻佛告王言何者是父汝但於假名五陰妄生父想若色是父四陰應非若四是父色亦應非色與非色性無和合無根信章安釋云本時五根未立今遂得信故名也述己弘願願云我於佛前悔願後更不作願諸衆生等悉發菩提心初聞佛偈住住央掘摩等凡三百六十七偈匿王去後匿王欲伐且見央掘去佛不遠王禮供已歎佛云能降如是惡人佛為說法得羅漢果四事為涅槃因一者親善友二者專心聽法三者繫念思惟四者如法修行論痺必至反街弄弄與巷同𤼣踡上呂員反下巨員反跛躄病也䆿魚際反睡中語亦有不曉世語達遠理者如會稽道樹寺頓悟禪師能悟深理而不曉近事出涅槃疏涅槃疏云昔徐僕射理人甚善為上虞令犯事不間答問如天柱瑜極解深義不曉世語言天柱瑜者天柱山也在會稽瑜名也時號頓悟禪師不曉世語者涅槃疏未治定本云瑜常身病有尼問疾云闍梨無所苦已就靈姑卜云無苦即問靈姑是誰答云是剡又問汝剡耶答云是夜行又問汝夜行耶而竟不知越俗名鼠為靈姑等故云不曉世語也又如昔莊嚴門下有淨藏法師唯能並難答無所以彭城正公能善解釋不便論義俱舍以九義立一瞿聲頌曰方獸地光言金剛眼天水於斯九種義智者立瞿聲九者一方二獸三地四光五言六金剛七眼八天九水皆名瞿聲亦與四教四門四句意同疏云佛但說一具四種意如說有句即具於無并雙亦雙非但作有解不名智臣此與四教義合佛說生生滅即不生滅雙亦雙非但作三藏生滅之解即非智臣此義又與四門義合亦有門乃至雙非門亦爾次第對鹽等四鹽有器無水雙亦馬雙非餘四教四門例之亦如是經中先合對無常等四經云如來為計常者說無常相令比丘修無常想為計樂者說於苦相欲令比丘多修苦想為計我者說無我相欲令比丘修無我想或說空者無二十五有相令比丘修學空相次對四常不動者是解脫中無有苦故是名不動是正解脫謂無相者無有色聲香味觸等故名無相是正解脫常不變易名曰常住或復說言一切衆生有如來性此四亦是四門異名不動有門無相空門不變雙亦門佛性雙非門不動藏無相通不變別佛性圓十非前論中已說六宗情期大同史記一陰陽二儒三墨四名五法六道德陰陽使人拘而多畏儒者傳而寡要勞而少功墨者儉而難遵是以其事不可偏循名者使人儉而善失真法者嚴而少恩道德者使人精神專一動合無形莊生歸於自爾莊云雲為雨乎雨為雲乎各自爾老氏專歎去奢老云聖人去奢去泰注云奢謂服飾飲食泰謂宮室臺榭去之者使人不過分也馬祀牛羊豕三牲之祭常聞之矣言馬祀者記曰大夫之喪薦馬羊蒸蒸冬祭名也冬以羊祭脯祀儀禮祭之以酒脯粟祭禮云求食家之粟以祭之然則粟祭非殺生不是燒然之因今恐是肉祭耳以肉粟同音寫者誤矣前廣後略如十乘無四三昧則後略神力品約教次第經云如來所有一切諸法自在神力祕要之藏甚深之事法力藏事次第對名用體宗序品約行次第經云以是知今佛欲說法華經今佛放光明助發實相義佛當雨法雨充足求道者諸求三乘人若有疑悔者佛當為除斷何殊體踏邪解禪師修體心踏心觀法下記中云雖體踏如空非體法實智雖推踏不受非無作捨覺利鑊等鑊字應作钁居縛反鉏與鋤同止亦名觀即停止止下論云停止止是行善屬觀門攝觀亦名止即貫穿觀下論云貫穿觀是止善屬定門攝翻識為智翻七識為四智謂成所作智大圓鏡智等純陀一品明涅槃施經云純陀者名解妙義白佛言我等最後供養為度無量衆生故佛言施食者有二種果報一者受已得菩提二者受已入涅槃等例道入例下例字應作倒三三為權謂三乘各有人教因是為三三在昔無果故三三俱權三結一我見二非因計因三疑斷離盡斷煩惱離生死盡止觀輔行傳弘決卷第五牛馬互無外道計無因無果若言父母是衆生因者男女當具二根又眼見男女不似父母等第三計各異互無如牛中無馬馬中無牛隨緣方便及息二邊俱明三止三觀隨緣三止者著空心息名止息止心住中道名停止義中道非邊是不止止義三觀可解息二邊三止者不著空假名止息止心冥中道名停止止中道非止非不止是不止止觀亦可解對斥小乘斥云唯阿那律天眼所見為作相耶無作相耶假使作相則與外道五通等若不作相即是無為不應有見借彼知見之名非全用義經曰云何為知自餓法投投淵赴火自墜高巖五熱灸身等云何不見菩薩不見一人行如是行得正解脫亦知亦見者為見衆生行於邪法必墮地獄是名為見知諸衆生從地獄出生於人中若能修行得入解脫又亦知亦見者見常無常苦樂淨不淨我無我是名為見云何為知知諸如來不入涅槃經中廣解天親無著金剛論下之二句復疏三諦百非中四句之二也以無有相貌句是三諦義記云無邊無中故是三也若三俱亡乃是絶四離百大論二十二云菩薩修十善各有五心謂下中上上上上中上初發五心乃至具足五心如是百心名為百福五心下一中二上三上上四中上五有五差別故所謂人天及以四教五種布施即五差別淨名疏釋云若持戒恭敬慈心大福自捨財亦教他修福如是等施皆人檀也若勝品十善持戒精進恭敬聽法慈心孝順華香續明皆天檀也此皆事施果報不同三藏二乘觀諦緣菩薩觀無常捨身命財如代鴿等並藏檀也通教體三事皆空愍衆生故捨身命財別教行人種種施圓教捨身者生死後際等觀離老病死得不壞常住命財亦爾檀即佛性大品云一切法趣檀已上並四教施也後成佛時五種一切能捨衆生來生其國但云願攝其義則通如云菩薩為菩提故離殺害心以此善根願與一切衆生共之願諸衆生得壽命長有大勢力獲大神通以是願故成佛之時國士所有一切衆生得壽命長有勢力獲神通又菩薩離盜心與衆生共之願諸佛土純是七寶故成佛時國土純是七寶衆生富足乃至遠離邪見與衆生共之菩薩成佛時世界衆生悉得受持摩訶般若波羅蜜言通者無五差別異觀因緣智四種不同下智觀之得聲聞乘乃至上上智觀之得佛乘四智對四教準知論種種行類相貌智論七十二云三事何異有人言行是阿跋致菩薩身口意異於他人以此表甚深智慧也類者分別知諸菩薩是阿跋致非阿跋致耶相貌者除行類種種因緣得知阿跋致相不決臧𠘶下音鄙語出毛詩蕩之什詩云於乎小子未知臧𠘶臧善𠘶非鄭玄箋云不知善𠘶乃是不識是非之義耳慧單而智復加一切成復且約前二藏通若單約境準智可知若境是自境名自性境因智故境名他性境境智因緣名共性境離境離智名無因境莊云天其運乎天運篇也運廣雅云轉也注云不運而自行地其處乎不處而自止日月諍於所乎正文所爭不爭所而自代謝孰主張是孰紀綱是皆自爾也記作氏誤孰居無事推而行是無則無所能推有則各自有事然則無事事而推行是者誰乎哉各自行耳已上並郭象注耳老計守雌道經曰知雄守雌為天下溪常德不離猶歸於嬰兒注云雄以喻尊雌以喻卑去尊就卑歸老於嬰兒無所知也君弱臣強至二教下文云三藏從無明生不由真起此自性邪見通教真是不生生一切惑苦滅此惑是由不生此他性邪見此界內惑以惑為自以真為他界外以法性為自無明為他別教計黎耶生法此執他性圓教計法性生法此計自性前君弱臣強今君強臣弱生等對四教精進若二藏相應即生生精進乃至圓教不生不生精進無言菩薩大集第十三云王舍城師子將軍生一子不啼泣乃至七日眼不瞬人謂之啞父母立字名無言後見佛廣現神變等無言即契理也論作四說性執久破與下化他境意同下記云自行若滿必須化他一一悉中皆四說下化他境中一一悉中各引四悉文證於一名下說無量義涅槃三十一云猶如涅槃亦名無生亦名無出亦名無作亦名無為乃至亦名吉祥以蜈蚣等用喻獨頭疏云蜈蚣譬戲論嗔守宮百足兀然譬獨頭無明今記文以蜈蚣喻獨頭似誤三昧樂意成身即三四五地心寂不動生方便土須已辦地也今見等地而言成身者或是超人或是以空三昧且攝之耳或是果中預談因位或以前而例後詳之豈圓六根更入別位三種意生攝別地前斯為正意若攝圓者斷通惑盡則攝入三昧樂斷塵沙則攝入覺法自性等位然六根淨位非次第人故云豈入別耳是二中間即是中道中間是指名色等五支苦果也苦道即法身名中道六因四緣因緣名義亦欲略知今依俱舍出之六因者一能作因謂一切無為法皆為能作因二俱有因如四相望本法互相假藉本法為因四相為果四相為因本法為果俱時而有故名俱有因如心王與心所亦互為也三同類因如過去善五蘊與現在善五蘊為同類因現在善五蘊與過去善五蘊為等流果又如過去解脫戒為同類因今別脫戒與未來別脫戒為等流果四相應因此唯心所法謂心王心所起必同時五義平等同一所依同一所緣同一行相同一時業更相隨順義用相應故名相應也互為果邊名為俱有若相應邊名相應也五遍行因謂苦諦下有五煩惱即苦下五見疑無明集下二見疑無明此十一俱三義一遍緣五部二遍隨眠五部三遍與五部染法為因此因為染污能與五部染法為因名遍行去聲或遍緣五部名遍行平聲行即滿也六異熟因謂能招果熟故名異熟因三性之中但取善不善就善法中唯取有漏善為異熟因為無漏善破壞三有不招異熟非因也為無記劣不招異熟言四緣者一因緣謂因如是緣故名因緣緣以前六因中後之五因為體唯除能作因二等無間緣謂前念心心所法齊等與後心心所法為緣或可後念心心所法齊等因前念心心所法為緣故云等無間緣言等者遍依及果三所緣緣所緣二字屬境緣之一字屬心謂心所緣法性劣執境方生猶劣人非杖不起四增上緣謂前六因中第一能作因即是增上緣體故一切法皆增上緣又婆沙中因緣相攝初六因攝四緣能作因攝三緣謂等無間緣所緣緣增上緣餘五因攝因緣緣謂俱有同類相應遍行異熟又四緣攝六因因緣緣攝五謂異熟俱有相應同類遍行若等無間緣所緣緣無因可攝能作因攝增上緣楞伽第四佛語心品心品第三云於彼演說大乘皆是如來地十地則為初初地則為八第九則為七七亦復為八第二為第三第四為第五第三為第六無所有何次既云為次所以互融恐人疑今記文寫者誤故撿經以決之為漸為頓大慧問為漸淨為頓淨佛言是漸淨非頓淨譬如陶師造器漸成非頓如來淨諸衆生自心現流亦復如是現流經謂漸頓之化佛從法性顯現流出頓現一切譬如明鏡頓現衆像而無分別如來淨諸衆生自心現流亦復如是頓現一切無相境界而無分別乃至云報佛亦爾於色究竟天頓能成熟一切衆生令修諸行五種種性佛經云若有聞說一一法自心顯現不思議境不驚不怖此是如來乘性既云不驚怖則是菩薩性也經中不言菩薩性聲聞經云若聞說蘊處界舉身毛竪心樂修習乃至我生已盡等此是聲聞性緣覺經云若聞緣覺乘舉身毛竪悲泣流淚捨離憒閙或聞神通變化其心信受是名緣覺今記不列緣覺不定經云不定性者謂聞三種謂佛及聲聞緣覺隨生信解而順修習而成大慧無性彼經四卷成部文中無無性只有各別性耳各別中又說聲聞五法謂相名妄想如如正智相者形相色像等名者有如是相名為瓶等妄想者有施設衆名顯示諸相瓶等心心法是名妄想如如者彼名彼相畢竟不可得彼如是相我及諸佛隨順入處普為衆生如實演說是名正智及三自性妄計自性謂計自性從相生於種類顯現生計著故二緣起自性從所依所緣起是緣起自性三圓成自性謂離名相事相二分別自性聖智二無我人無我法無我論十地為如佛大論五十中解云菩薩坐七寶菩提樹下入第十地名為法雲譬如大雲澍雨連下無間心自然生無量無邊清淨諸佛法乃至云降魔放光具十力等十方諸佛大聲唱言某方某國某甲菩薩坐於道場具佛事是名十地當如佛樂定樂慧轉世現信解見得身證此一說未知記主據何處文耶蓋以樂定樂慧自是上流般中一位開出又復身證不入學人之位此說與下文俱舍問答相違學者辨之無學為九乃至不壞法死至骨想是俱解脫之因故果有神通一間俱舍頌云斷惑八品一生名一間疏釋云間為間隔為有一生為間隔不證圓寂退護思住達五字下各有一法字謂退法乃至達法問何緣身證不預其數連上文是俱舍語也此問者是問學人十八中何不云身證俱舍頌云得滅定不還轉名為身證彼釋云若不還果修滅定轉名身證滅定無身由身證得故名身證故答之滅定有漏不是依因故不預數今記中於三果開為十一內有身證俱舍則無或恐是誤也止觀輔行傳弘決卷第六論斷奠上丁段反下丁定反涅槃疏云無差也正量部權衡刊定名量無邪謬名正西域論名也苦縣上音戶東夏之神州南山戒疏云雪山已南三方歫海周九萬里厥號大夏此方中嶽亦中華且據軒轅局談中表故河圖云崑崙東南方五千里號曰神州爾雅云河出崑崙佛經云四海本源香山所出分流四海俗云崑崙者謂香山耳初約四句料簡論但三句言四者準前義加非漸非頓故曰未若權實章中其名委悉以下有非權非實句漸頓復兼偏圓漸頓指釋文中今回在前經中佛如醍醐已方云如牛新生血乳未別今論在聲聞前列之故云也血者無明煩惱也乳者衆生善五陰也二相經云摩訶般若波羅蜜中我無我無有二相又云一切法善不善等亦無有二相別教之終地上愚夫禪經云二乘之人知人無我見自他身骨鎖相連無常苦不淨相漸次不捨增勝至無想滅定觀察禪經云自知共相人無我已亦離外道自他俱我於法無我隨順觀察真如禪經云若分別我無我有二是虗妄念若如實知彼念不起是名真如禪如來禪經云入佛地住自證聖智為諸衆生作不思議事是如來禪欲入第七住七住名不退六住名正心有人云六住退者是權耳今為經中說退者法財王子及八萬人皆退若舍利弗示作法財權退可然豈八萬人皆權退耶又有人云初住斷見斷已不退今六住退者名伏為斷是故退耳此亦非矣若十信中立斷名者可是名伏為斷今十住中本是斷位如何名斷為伏太顛倒也又有人云六心退者非第六正心中退也乃是第一發心住位中橫開為十於此十中第六而退此又穿鑿太過矣經中自云十住之前一切凡夫法中發菩提心者有恆河沙衆生學行佛法信想心中行者是退分善根若一切二劫乃至十劫修行十信得入十住爾時從初一住至第六住若修般若波羅蜜止觀現前復值諸佛菩薩所護出到第七住自此已前名為退分若不值善知識一劫二劫乃至十劫退菩薩心不名習種性若讀此文則知非初住中橫開之六心也今試議之夫見惑牽四趣生若斷見已不墮四趣思惑牽人天生若斷思盡出人天界良由別人宿善不等致令今世用觀不同若先斷見次斷思者此等行人必不言退次第用觀故也若用斷見斷思二智同在一念等觀兩惑者記主謂之俱斷斷之未盡則此人多退然則遇惡緣則退值善緣則進非謂俱斷之人一例退也昔人以截藕為喻於義未明今記引大論云舍利弗六千劫若優婆塞戒經云舍利弗六萬劫求菩提所以退者未得解脫劫數不同不須和會大經數等名異此下記中引論舊醫乳藥略如玄籤備撿引涅槃注制多塔也僧祇四受云云五分五受云云四分亦五南山業疏云僧祇八受謂善來自然五十八二十遣信曾歸也五分十二受一自然二一語三二語四十一衆五破惡見實六第一受具七善來八三語九八敬十羯磨十一二十僧十二遣信也四分各五有十一善來二破結三三語四邊方五人五中國十人此五是僧也一八敬二二十衆三遣信四小年曾歸五邊方十衆此五是尼也今文與業疏不同者恐誤驗知前文小無懺重之誤是違記耳多伽見母明受不同多論七受謂自誓見諦三歸善來三語八法羯磨伽論十種謂無師自誓見諦問答三歸五衆十衆二部僧八重遣信見論八種謂教授三歸問答善來重法遣信八語羯磨毗尼母論十種謂善來建立三語羯磨隨師教遣信勑聽上法本初要期求戒及才破結果與戒一時俱得故名上法白木調有人以調作去聲呼非也據梁書職貢圖作條五人受中須一人持律此別部之意耳四分則不然須五皆明律故業疏云邊地開五要須持律非假持律焉得成遂百罵八敬謂百夏比丘尼禮初夏比丘足不得罵僧不得舉僧過依僧受戒依僧懺殘罪半月請教戒不得無僧處安居依僧自恣是尼端正十誦迦尸國有女端正姝好價直半國大臣大官求之不得此女遂乃出家有諸惡輩皆習議云若受戒時我於路中須奪取之諸尼聞已不知云何乃往白佛佛言從今聽此半迦尸尼遣使受具足戒亦名十二語三番白四名十二語初番於尼中白四次番為端正尼若自往大僧中受戒路上恐為惡輩所奪佛令醜尼僧中代為受戒即遣使也第三是醜尼却回來騰僧羯磨又名白四此非尼常行法蓋是也正女一緣耳若常行法沙彌尼先於比丘尼壇上白四羯磨受戒畢此名本法尼也次須於大僧處再秉白四羯磨但兩番也十利戒戒之下皆有十利一攝取於僧二令僧歡喜三令僧安樂四未信者令信五已信令增長六難調者調順七慚愧者安樂八斷現在有漏九斷未來有漏十正法久住一支一境身三口四等支殺盜淫妄等境隨其支境犯者結罪輕重犯淫三趣三趣者四分謂人畜非人也人則女人三道男子二道若覺并睡眠及死而未壞或少壞但使入毛頭許皆波羅夷畜則牛馬猪狗鴈雞之屬莫問心懷想疑但是正道皆結夷非人者攝天子修羅鬼神地獄四類也業疏云人畜兩趣形現易知天鬼神等幽通難識故合天與修羅鬼畜為一趣是則開成六道合成三趣耳相部對內相部即河北相州厲律師之義也犯邊罪者多論障在家外衆并出家內衆若相州厲律師謂但障內衆故云對內作白已後入餘心者多論云作白之時具上四心不名得戒羯磨已後方有四心皆是得限餘心者謂惡無起睡眠四心三性始末恆有無作戒者律鈔云無作一發續現始末恆有四心三性不藉緣辨也故雜心論云身動滅已與餘識俱是法隨生故名無作言四心者三性之外加睡眠多羅樹西域記云其樹如此方棕欄高七八尺果熟則赤大如石榴乃至天樂廣如初句廣如經中第一句說最末句云若見男子隨逐女人時或見女人隨逐男子時便生貪著如是菩薩成就欲法毀破淨戒污辱梵行令戒雜穢不得名為淨戒具足乃至為生天受五欲樂如是菩薩成就欲法毀破淨戒污辱梵行式叉迦羅尼此翻名學即衆學法也律五篇之第五若據餘部餘心亦得四分之外皆名餘部成論云出入常有善心轉勝故若八無作中言隨心無作者隨生死心恆有無作非謂隨定慧十八法中亦欲略知今引律文注之一法非法多論云八正真軌是趣道因名為法彼說為非法五邪不能生解為非彼說為是彼者指調達也下去皆爾二律非律八正真能調身口離於七非稱為律也彼說為非律五邪反前彼說為律三犯不犯多論云不剃不剪佛判有罪名犯彼謂有命若不剃剪說為不犯又律中不犯心念作惡未形身口以惡微故不制有罪說為不犯彼說心起三毒最是過本說名為犯四若輕若重律犯遮惡為輕彼為一切草木皆重重者初篇業思一形永障為重彼見先作無犯便言淫盜俱輕五有殘無殘犯下四篇非一生障名曰有殘彼說無殘若犯初篇永喪道芽名曰無殘彼說有殘六粗惡非粗惡初二篇若身若口無慚心故犯濁重偷蘭名粗惡非粗惡者波逸提下及餘偷蘭也彼皆反說七常所行非常所行八正道常所用法彼說非常五法非常用法彼說常所用又了論云非常行者非佛所作所習也彼即說是常所行者是佛所作入定說法受現法樂是佛所習彼又反說八制非制五篇是佛金口所制彼說非制五法非佛所吐彼說為制九說非說五篇之中四是重禁餘是輕約此名正說彼說為非四禁為輕餘篇為重是名非說四禁為輕餘篇為重是名非說彼為是說十八法皆多論中文毗尼與律毗尼翻律不可並列對心對境能對之心所對境也境即殺盜淫妄等境母論云犯必託境關心成業若罪若事罪即殺盜等罪事即五篇懺悔等事若雙若單雙則雙持雙犯單則單持單犯言雙者戒疏約二以明持犯一約心用一切諸戒並具四行止持作持止犯作犯二約教行此乃或具不具言心用者如止殺盜先修慈悲少欲等行以行成故名為作持望境不起名為止持此即止中有作此名雙持反此二持乃成雙犯也言教行者若聖教聽作制作聽作者如二房等戒制作者如半月說戒亦具四行如欲說戒羯磨先止外緣望離粗過名為止持後善行成名為作持名作中有止二犯者亦反上也已上名雙持雙犯也單持犯者如淫盜等約教為論佛不許作只有單持單犯耳不作名持作者名犯也煮燒等輕重之相準目連問罪報經若比丘比丘尼無慚愧心輕慢佛語犯突吉羅衆惡戒罪如四天王壽五百歲墮泥犁中於人間歲數九百千歲乃至犯波羅夷罪如他化自在天壽十六千歲墮泥犁中於人間歲數計九百二十一億六十千歲一犯既是諸犯亦然其餘三篇不復録出隨所詮一塵一心一觀皆遍法界六塵三心攝一切法且如色塵則善惡法性等色十界互具即空故一切色一色即假故一色一切色即中故非一非一切色塵既爾餘塵亦然六塵既爾三心亦然豈同篇聚但詮輕重雙單等相而招報各別耶為篇一夷二殘三波逸提四提舍尼五突吉羅為聚五遍中加偷蘭文殊問經彼列五夷二提一吉五夷者經云若以心分別男女非男非女等是菩薩犯波羅夷若以心分別畜生餓鬼男女非男非女諸天神男女非男非女是菩薩犯波羅夷若以身口行不堪得三乘若受出世間菩薩戒而不起慈悲心是菩薩犯波羅夷若以身口行不堪得三乘若他物若小若大若長若短若有色若有形若住若動若覆藏若移處若有封印若盛貯若以心起盜想犯波羅夷若以身口行不堪得三乘若起妄語心犯波羅夷二提者佛法僧物若華香塗香若衣服若珍寶若菩薩以踐踏犯波夜提若佛塔若佛所行處及菩提樹轉法輪處若以腳踐踏犯波夜提若不信者不堪得三乘一言者若吐舌動眼毀諸威儀起此想者犯突吉羅若以身口行不堪得三乘摩觸或比丘摩觸女人身或女人摩觸比丘身分不動而受樂者偷蘭動而受樂犯殘有因蘭果蘭異僧中行白懺僧殘極有四法謂別住六夜本日治出罪行白者與犯殘人白四羯磨其犯殘者具威儀白云大德僧聽我某甲犯故漏失餘罪準白下意奪三十五事是折伏法勿得有違執衆勞苦奉清淨比丘是調伏法彼行覆藏者應日三時見清淨比丘應作者一切如法不應違逆至布薩日應掃灑布薩處供給調度乃至自在小房中住有客來遣出者答云不得二人共宿不得與清淨比丘共住經行不得同一林坐並是其意卑下奪三十五事七種不同初五奪眷屬一不得授人大戒二不應授人依止三不應畜沙彌四不應受僧差教授比丘尼五若僧差不應往二五奪智能一不應說戒二若僧中問毗尼義不應答三若僧差作羯磨不應作四若僧中簡集智慧者共評論衆事不在其列五若僧差作信命者不應作三五奪順從一不得早入聚落二不得福暮還三親近比丘四不應近白衣外道五應順從諸比丘教不應異語四五奪相續後犯一不應更犯此罪餘亦不應犯為殘作訶責指下篇為餘二若相似若從此生相似謂同一篇罪也從此生者謂為摩觸訶責而與女屏坐三若復重於此謂犯提被治後更犯殘等四不應嫌羯磨五不應訶羯磨人五五奪供給一若善比丘為敷坐具供養不應受二不應受他洗足三不應受他安洗足物四不應受他拭革屣五不應受他揩摩拭身六五制其恭敬謂不應受善比丘禮拜合掌問訊迎送持衣鉢七五奪其證正化事一不應舉善比丘為作憶念作自言二不應證他事三不應遮布薩四不應遮自恣五不應共善比丘諍云云然非但殘奪三十五事犯夷亦然耳本日等名為治擯此懺犯殘情過也如行百夜別住今已滿五十夜若再犯者前五十夜俱失當再行百夜六夜中犯亦爾以違僧命故前法壞言六夜者梵云摩那埵此翻意喜謂罪淨故自喜又衆僧亦喜如行滿五夜又再犯則五夜俱失當再治之謂本日治因蘭梵語偷蘭此翻大障謂遮障善道也因蘭有三品若初篇近方便是上品蘭初篇次方便并下二篇近方便是中品蘭遠方便是下品蘭因蘭亦名從生蘭若果蘭者亦名自性蘭非二篇而生也即是破僧并盜四錢及裸形見佛之類是果蘭論不息世譏嫌涅槃十一云息世譏嫌戒者不作販賣輕稱小斗欺誑於人因他形勢取人財物害心繫縛破壞成功然明而臥等又不畜象馬車乘奴婢金銀穀米麥豆黍粟稻麻等無救之門阿鼻翻無救也應引大經十二等謂邪常等下四聚名破律儀蘭提悔吉南山此文雖則有據據唯識論判位太高位者論明五位不離唯識五位者一資糧二加行三通達四修習五究竟一資糧者未能修唯識觀但修福智資益己身故頌云乃至未起識求位唯識性於二取隨眠猶未能伏斷此中通明四行謂十信十住十行十回向二加行者即暖等四善根也暖位得聖道之前相發下品四尋思觀謂一名二義三自性四差別此暖位菩薩第六識於定中觀此四法成空相分二頂位菩薩依明增定作上品尋思觀重觀察名義等四皆自心變三忍位忍境識空伏除煩惱所知二障四世第一位作無間定發上品如實智三通達者作唯識觀入見道也至此已來無數劫滿即在初地然此見道略有二種一真二相真見道者已根本無分別為體證生法二空實斷二障也相見道者即十六心等菩薩得此二見道時生如來家住極喜地四修習行者出前所說相見道也乃至第十地終金剛心無間道已並名修道也五究竟者從金剛心後解脫道中盡未來際唯佛獨能所作已辦也此五位中資糧四十心菩薩多在散位但修六度萬行耳第二加行位十向後心作影像唯識觀第三通達第四修習位修道亦作真實唯識觀等云云若佛果者即究竟第五位也故曰太高然太高之言頗為弘律者所非謂律中自有初心懺罪之法故也然則荊溪豈不知之耶今太高之言亦且據論一往語耳小乘中僧別兩懺僧者如四僧已上行白四羯磨懺夷者是也別者如對首懺提等是也鞚口貢反勒韁也肉身法身至三趣不至三趣象壞肉身不至三趣惡知識壞法身至三趣象是身怨惡知識是法怨奏師子琴阿修羅王取師子筋為琴絃加以醎水涅槃經意如渴者飲以醎水愈增其渴也四動以對一修動修不動修亦動亦不動修非動非不動修十六句餘三句者謂動不修不動不修亦動亦不動不修非動非不動不修又動亦修亦不修不動亦修亦不修亦動亦不動亦修亦不修非動非不動亦修亦不修又動非修非不修乃至非動非不動非修非不修十六句中各有其義愈音俞寫誤經作瘡字彼云如人瘡病許畜重物氈褥金寶體用俱重合百一畜長等以為下根百一本中根畜長本下根今文一往合為一說淨說淨法有二一展轉淨得衣已十日滿未見明相前求一比丘對首云大德一心念此是我某甲長衣未作淨今為淨故施與大德為展轉淨故彼受淨者言長老一心念汝有是長衣未作淨為淨故與我我今受之汝施誰答曰施與某甲受淨者又言長老一心念汝有是長衣未作淨為淨故施與我我已受之汝與某甲是衣某甲已有汝為某甲故善護持使取著用隨因緣一說二者真實淨才得物須作斷心決定捨之物過他人邊受持等事除上根忍力成者其餘人並須說淨并加法已方可受持若新者須作法捨舊三衣已方可加法不加法者違佛所制猶國俗服耳然佛制三衣須體量色三並須如法方加法可然隨坐隨坐乃至一坐食耳不作餘食佛制足食已捨威儀如坐食時前境堪足忽低頭取與後分離狀之例名捨不作餘食法而食者咽咽墮罪僧祇捨威儀有八種謂行住坐臥長牀短牀乘般且如牀上坐已若見師僧塔象在背後者回身避坐曳身不得離牀若離名捨威儀若正食時天雨於上持蓋無者合牀舁著覆處舁時倒地及諸緣離本坐處更食者犯墮作餘食法者一從淨人受已共未足比丘互跪云大德我足食已知是看是作餘食法二授與前人三舒手相及處作三法一彼受為食二口云我止汝取食之三度與他凡論食是正食也僧中得衣或分亡五衆衣或施主送衣略如食法上起貪下起瞋中起癡小食粥後食過中非時有云加法畜百一者是中根人但有加法而無說淨若下根人三衣六物之外一切說淨而為淨施大乘以佛菩薩為淨施主小乘以和尚闍梨為淨施主即衣藥鉢也我物屬他展轉淨施主即衣藥鉢也說淨已並屬衣藥鉢所有禁性重之由凡果物及飲食藥餌等並須從淨人邊受不爾屬盜持鉢持衣鉢須鐵瓦者異外道故衣須布㲲者異俗流故今之人畜木鉢衣羅縠非外道俗流而何斥三修前已箋注二邊皆有粗細常途說覺觀者如眼見色名覺細心分別形顯等異名觀今修中觀知生死動有邊名覺空亂意涅槃邊名觀故云也三覺謂欲恚害欲覺者經云譬如端正淨潔之人不受一切穢污不淨如熱鐵丸人無受者恚覺者譬如有王以四毒蛇盛之一篋令人養食若令一蛇生嗔恚者我當戮之四大亦爾若一嗔者則能殺人害覺者觀察五陰如旃陀羅常懷害心五陰亦爾常懷諸結惱害之心一一諦上皆有見愛執俗諦起見名寒起愛名熱觀俗破見如暖破愛如涼中諦執破愛見準說可知中根義開通別論中先通言次別說碓磑上丁會切舂也下五對切磨也不受壞生但有生性者乞食人一切不受貯宿殘煮殘宿者今日受已至明日一切沙門釋子受大戒者皆不清淨五分云比丘受食已或食未食經夜名殘宿問殘之與宿為一為異四句答之一殘而非宿且受四藥不加四法過中吉羅二宿而非殘亦吉禾愛食或共宿犯吉不宿不犯三亦殘亦宿四非殘非宿可知又殘宿內宿亦作四句一是殘宿非內宿今日受食安界外不共宿非內宿得墮二是內非殘三四類知煮者比丘在淨地同宿同煮及自煮等論淨名云於食等者於法亦等乃至於食等疏約事理以釋事者捨貧從富捨富從貧以食不等則慈悲觀行皆悉不等是為於食不等於法不等若貧富俱乞於食若等則慈悲觀行亦等理者大品云一切法趣味味為法界含一切法食有故法有食無故法無食不可得故云何有趣非趣此中道真禪悅食惸獨上巨榮切無兄弟曰惸老而無子曰獨斷金上丁亂反易繫辭云二人同心其利斷金孔頴達云二人若同齊其心鐵利能斷截於金金是堅剛之物能斷而截之言其利之甚朝歌上知遙反地名也紂王所都魏文帝改為朝歌郡周武帝又改為衛州莊以蔗支離乃至五管在上文在莊子與今文少別彼人間世篇云支離疏者頤隱於臍肩高於頂會撮指天五管在上彼無燕字支離疏者謂形體支離不全之貌也遂得疏其名頤隱於臍者脊曲而項縮也會音膾撮音最乃項椎也以脊曲頭低故兩肩疏而指天也五管在上者管本作管管者腧也謂五藏之腧皆在上腧式注反也若賜疾者粟乃至我則無用非莊子之全文乃記主取彼之意而為語耳彼云上徵武士則支離攘臂於其間恃其無用故不自竄上有大役則支離以有常疾不受功不任作役上與病者粟則受三鍾與十束薪役則不與賜則受之夫支離其形者猶足以養其身終其天年況支離其德者乎有力者負而趨之莊子曰藏舟於壑將謂固矣不知有力者負而趨之止觀輔行傳弘決卷第七十境互發十乘增減一一法中皆有通塞十境增者具發於十減者或發三四等若發而用觀則通不用觀則塞此乃境出十乘增者具修於十減者或修三四等入位名通不入名塞此乃乘也對轉兼具如助開中對治等四論六事六理六事者事釋中三知識及觀心中佛威神覆護并脫纓著弊又一音說法等三是也六理者六度并法性各開為三此六事六理三諦各具是為十八頻婆娑羅王以欲色故入怨國在淫女房論十七中略釋論謂歒國獨在淫女阿梵婆羅房中優填王以欲色故截五百仙人手足論不說截手足緣地神即后土也孝經緯曰社土地之主也土地闍不可以盡敬故封土為社以報土今壇是也禮記曰共工氏之子后土為社共工氏之霸九州也其子曰后土能平州故祀以為社共工者伏羲在位一百一十年之後即有女媧氏次即共工氏五穀之神孝經緯曰稷五穀之長穀不可以遍祭故立稷神以祭之禮記曰厲山氏之子柱及周棄為稷柱能植百穀夏之衰也周棄繼之是故二人並為稷神田正未詳敢發發開也倮而嘇下山咸切口噉也未齓初覲切應作齓謂毀齒也男八月而齒生八歲而毀齒女七月而齒生七歲而毀齒既笄音雞禮女十有五而笄謂以竹而簪髮也周賂音路謂貨賂也八音金石絲竹匏土革木土曰塤今童子吹之皮曰鼓應曰革竹曰管篪也長一尺四寸圍四寸九孔絲曰絃琴瑟石曰磬木曰柷方二尺四寸中有椎合樂之時投椎於中而撞之論憋龍氣憋卑列切怒氣也女第越本作女女應作次五之亂越本作之之應作色五臭亂鼻春羶夏焦中央香秋腥冬朽朽許九切氣若有若無也困悛中顙中去聲悛本作惾子公切又音悛七金切恐誤釋云因惾猶刻賊不通也喝口經本濁亦作噣音同竹杖切恐有釋音滑心音骨謂汩亂也老語大同老曰五色令人目盲五聲令人耳聾五味令人口爽緣起觀觀十二因緣破三世疑懵莫孔切憒公對切心亂也嚬缺嚬呻缺㰦毗鉢舍那此翻慧二二立一睡眠二掉悔二睡眠遍不違若有皆增一論中此之二句本在無覆許十二句之後疏釋云睡眠遍不違者謂於善惡無記中遍有不違也隨何所有皆說此增若善心中二十二則加至二十三若前二十三則加至二十四惡及無記準說可知十大地受想思觸欲慧念作意勝解三摩地十大善地信不放逸輕安捨慚愧無貪無瞋不害勤及尋伺即覺觀之二同也有時增惡作此惡作通善惡性於善心中有無不定故言有時善心若有於前心品更增作成二十三也惡作者謂緣惡作心追悔性問何等惡作說名為善答謂於善惡不作中心追悔性謂於先時於善不作於惡而作後生追悔名善惡作也與此相違名為不善謂先作善而作惡後生追悔名不善惡作也故此二惡作各依善惡二處而起大地十同前大煩惱地六癡放逸懈怠不信昏掉大不善二身邊二見也此二是有覆無記四煩惱忿等惡作二十一此三類不同一四煩惱謂貪瞋癡慢二忿等者謂等取十小隨煩惱也言十小者謂忿覆慳嫉惱害諂誑憍恨三惡作者謂不善心中惡作此類各有二十一心所有覆有十八謂大地十大煩地六及尋伺二無覆許十二欲無覆心異熟生心等也此十二心所俱生謂大地十與尋伺也言許者依薩婆多宗惡作不通無記故於無記心唯許十有二不同經部惡作通無記心中更加惡作故得有十三也已上並俱舍疏略欲知之麂音己玃居縛切大猿也八肘每一肘尺八寸下座若多人坐禪令最下一人不得拄脅犯擊櫪戒也佛在舍衛六群一人擊一人幾令命終故今云不得以拄其前拄𮌎也三搖不動若坐禪人困肩下座人以杖就胸前三搖而窹之若搖之不動就左邊擉之螉音翁廣說法門野干為天帝釋自說因地作國王以兵借於小國鬪戰傷害又受諸女耽荒奢侈進犯惡業身死乃生地獄餓鬼今生畜作野干身又說十善十惡四等六度諸法道品乃至野干七日命終之後生兜率天大論枝觚廣大觚酒爵也論三七中作柧文云柧枝廣大又云其枝及柧柧即柧棱論如點頭以竹篙於船頭拄點之船欲東則西拄欲西則東拄三教菩薩教應作藏因果合論欲界苦粗障色界勝妙出是上下六果更有上下六因具如禪門高聲唱令聞記脫間字餘八是別八應作九能答問者許是五品論云問觀自生心云何四不說離戲論諍訟心淨如虗空問觀自生心云何知自心起十種境界成一心三智問觀自生心云何知十境各成十法乘遊四方快樂凡三十六問許是五品者非是口與筆答乃是心答耳更以權實四章互顯文云對三權說一實四種止觀皆實不虗又四種皆權乃至云強說為權強說為實且以中行破彼同居方便二死若云被生死過五百須至妙覺名為越野今初住甚以中道行破同居方便二死耳以實報之死未盡故云且理雖無差金剛智初地與等覺無差但淺深異耳文雖各說金剛名牢強稱割三惑越一死名雖不一牟子漢靈帝崩後天下擾亂時牟子為蒼梧太守伏櫪音歷馬舍髦俊上毛音爾雅曰土中之俊如毛中之毛謂最長者也辭不說一夫多夫雪山大士被帝釋試之聖行品云昔過去佛日未出我於爾時作婆羅門求索大乘乃至不聞方等名字經無量歲求大乘故修行苦行時帝釋自變其身作羅剎像下至雪山而試之宣過去佛所說半偈云云我言大士汝何處得是之偈羅剎言我為飢渴苦惱心悶亂語耳大士更求餘半偈羅剎言汝若捨身者我當為說大士敷座白言願和尚說餘半偈云云搨其鼻上都搕切應作搨或作㯓手打也具已第八卷已應作如初二對三止三觀初二一對即法修也法修皆次第即前次第止觀也但前大意中是修今是所發為異耳然列中云互發有十須談十境謂次第十不次第十至釋次第但三四次第止觀者須境境次第三止觀也不名為頓至法名頓耳論後發陰入陰境常現言發者下記中云謂發陰解也陰解者百界五陰咸空假中調伏用三教調伏經云文殊有疾菩薩云何調伏其心維摩詰言有疾菩薩應作是念我今此病皆從前世妄想顛倒諸煩惱生無有實法誰受病者乃至設身有苦念惡趣衆生起大悲心我既調伏亦當調伏一切衆生但除其病而不除法慰喻用三觀慰喻經云文殊菩薩問居士言菩薩云何慰喻有疾菩薩居士言說身無常不說厭離於身說身有苦不說樂於涅槃乃至云以己之疾愍於彼疾當識宿世無數劫苦當念饒益一切衆生憶所修福念於淨命勿生憂惱常起精進疏云三教被信行三觀被法行三十六問云何於此經究竟到彼岸等十功德具如備撿第二卷末略箋六師富蘭那等十仙一闍提首那二婆吒三先尼四迦葉氏五富那六淨梵志七牘子梵志八納衣梵志九弘廣十須跋陀如藥塗屣堪任乘御大經云如良醫人以呪呪藥用塗革屣觸諸毒蟲毒為之消此大涅槃經亦復如是若有衆生犯四重禁五無間罪悉能滅令住菩提如藥塗屣能消衆毒慢有八種俱舍惑品但七慢一大慢二過慢三過過慢四我慢五增上慢六下慢七邪慢此記之末亦略釋今足憍慢成八頭數不足如陰境但色不云餘四縱列五陰不云十二入十八界乃至二乘不云二教及列菩薩又不云三菩薩總中缺一但九境而已滅受想中闕此一故第八滅受想背捨今闕此一但成七耳利中禪復禪應作單相生相尅肝生心是木生火則安心尅肝是火然木則病但有煩惱使易為妍習略節於此初三十六句者先立四句入涅槃謂不斷煩惱不入涅槃凡夫也斷煩惱入涅槃無學人也亦斷亦不斷亦入亦不入三學人也非斷非不斷非入非不入謂理是也一一句各四同根本四句成二十句又四句出涅槃謂不斷出斷出亦斷不斷亦出不出非斷不斷非出不出一一句各四又成十六共成三十六句諸法謂諸法生般若生諸法不生般若不生諸法生亦生不生般若亦生亦不生諸法非生非不生般若亦非生非不生四句各四并根本四亦三十六句法身法身應化一一起四身又四身入一身身身亦四共三十六句修發各四句各者謂修發四句發修四句兩四句中又句句各四成三十二修發二四各初二句修發二句者謂修發修而不發發修二句者謂發修不發修修發既成十六句謂修發修而不發修亦發亦不發修非發非不發句句各四成十六句發修又成十六句謂發修發不修發亦修亦不修發非修非不修句句各四成十六根本四句乃三十六句見中外外下外字應作人互損互益於十境中有觀而無止則散有止而無觀則昏此互損也止觀相資則互益俱損俱益十境止觀不明則俱損明則俱明登地正同正應作證小煩惱地十前文注十小是也俱舍心所法有四十二今記但列三十八更列根本四煩惱則四十二也四謂貪瞋癡慢十四不相應行謂得非得同分無想果無想定滅盡定命根生住異滅名身句身文身遍行五謂作意觸受想思別境五謂欲勝解念定慧隨煩惱二十謂忿恨覆惱諂誑憍害嫉慳無慚無愧不信懈怠放逸昏沉掉舉失念不正知散亂不定四謂睡眠惡作尋伺若大乘心所法有五十今記中且列四十四若更列根本六煩惱則五十也六謂貪瞋慢無明疑不正見及念佛八念中第一念佛屬未到初禪前未到定魔屬欲界未到色界故根遮四句根利遮輕根利遮重根鈍遮重根鈍遮輕欲六人四六欲天并四洲人皆善五陰攝也為順初禪一劫壽初禪第三天壽六十四中劫今云一劫者更加二十中劫乃一大劫也更詳八劫方至二禪初禪初天二大劫二天四大劫三天八大劫第三天壽三禪第三天六十四大劫九念處三藏三乘三念處三因大異故通教三乘共一念處三因大同故別教方便中三念處三觀次第故登地一念處圓教一念處前七屬方便藏三通一別三即後二境二乘菩薩用七方便之法
